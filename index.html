<!DOCTYPE html>
<html lang="fa" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover" />
  <title>Pishbini Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#020202;
      --bg-soft:#090909;
      --card:rgba(255,255,255,0.045);
      --card-2:rgba(255,255,255,0.03);
      --line:rgba(255,255,255,0.08);
      --line-2:rgba(255,255,255,0.14);
      --text:#f8f8f8;
      --muted:rgba(248,248,248,0.52);
      --green:#7dff9c;
      --glow:rgba(255,255,255,0.08);
      --shadow:0 22px 60px rgba(0,0,0,0.45);
      --radius-xl:34px;
      --radius-lg:26px;
      --radius-md:18px;
      --font:'Inter',system-ui,sans-serif;
    }
    *{box-sizing:border-box;margin:0;padding:0;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
    html{-webkit-font-smoothing:antialiased;scroll-behavior:smooth;background:#000}
    body{
      min-height:100vh;
      font-family:var(--font);
      color:var(--text);
      background:
        radial-gradient(circle at 8% 8%, rgba(255,255,255,.06), transparent 18%),
        radial-gradient(circle at 85% 12%, rgba(255,255,255,.04), transparent 22%),
        radial-gradient(circle at 50% 100%, rgba(255,255,255,.03), transparent 26%),
        linear-gradient(180deg,#010101 0%,#050505 36%,#0a0a0a 100%);
      padding-bottom:88px;
      overflow-x:hidden;
    }
    body::before{
      content:'';position:fixed;inset:0;pointer-events:none;opacity:.55;
      background-image:linear-gradient(rgba(255,255,255,.02) 1px, transparent 1px),linear-gradient(90deg, rgba(255,255,255,.02) 1px, transparent 1px);
      background-size:28px 28px;
      mask-image:radial-gradient(circle at center, black 40%, transparent 88%);
    }
    button,input{font:inherit;color:inherit;border:none;background:none;outline:none}
    button{cursor:pointer}
    .wrap{max-width:860px;margin:0 auto;padding:0 18px;position:relative;z-index:2}

    .topbar{
      position:sticky;top:0;z-index:80;padding:16px 0;
      background:rgba(2,2,2,.72);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
      border-bottom:1px solid rgba(255,255,255,.05)
    }
    .topbar-in{display:flex;align-items:center;justify-content:flex-end}
    .leader-btn{
      padding:10px 16px;border-radius:999px;background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);font-size:.84rem;font-weight:800;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.06), 0 10px 30px rgba(0,0,0,.25);
      transition:.24s ease
    }
    .leader-btn:hover{transform:translateY(-1px);background:rgba(255,255,255,.10)}

    .hero-pad{padding-top:24px}
    .controls-shell{
      position:sticky;top:74px;z-index:20;
      padding:14px;border-radius:28px;
      background:rgba(10,10,10,.58);
      backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
      border:1px solid rgba(255,255,255,.06);
      box-shadow:var(--shadow);
      margin-bottom:20px;
    }
    .player-tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
    .p-tab{
      position:relative;display:flex;align-items:center;justify-content:center;gap:8px;
      min-height:50px;border-radius:16px;background:rgba(255,255,255,.035);
      color:var(--muted);font-size:.84rem;font-weight:900;letter-spacing:-.02em;
      border:1px solid transparent;transition:.28s cubic-bezier(.22,1,.36,1);
      overflow:hidden;
    }
    .p-tab::after{
      content:'';position:absolute;inset:auto 10% 0;height:2px;border-radius:99px;
      background:linear-gradient(90deg, transparent, rgba(255,255,255,.85), transparent);
      transform:scaleX(0);transition:.28s ease;
    }
    .p-tab.active{
      color:#000;background:linear-gradient(180deg,#ffffff,#d9d9d9);
      box-shadow:0 12px 28px rgba(255,255,255,.11), inset 0 1px 0 rgba(255,255,255,.8);
      transform:translateY(-1px);
    }
    .p-tab.active::after{transform:scaleX(1)}
    .p-ava{font-size:1rem}

    .filters{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding-top:12px}
    .filters::-webkit-scrollbar{display:none}
    .filter{
      padding:10px 16px;border-radius:999px;background:rgba(255,255,255,.035);
      border:1px solid rgba(255,255,255,.06);font-size:.82rem;font-weight:800;color:var(--muted);
      transition:.24s ease;white-space:nowrap
    }
    .filter.active{background:#fff;color:#000;border-color:#fff;box-shadow:0 10px 26px rgba(255,255,255,.10)}

    .list{display:grid;gap:18px}
    @keyframes cardIn{from{opacity:0;transform:translateY(22px) scale(.985)}to{opacity:1;transform:translateY(0) scale(1)}}
    @keyframes shine{0%{transform:translateX(-120%) skewX(-20deg)}100%{transform:translateX(220%) skewX(-20deg)}}
    @keyframes floatFlag{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
    @keyframes pulseLive{0%{box-shadow:0 0 0 0 rgba(125,255,156,.35)}70%{box-shadow:0 0 0 14px rgba(125,255,156,0)}100%{box-shadow:0 0 0 0 rgba(125,255,156,0)}}
    @keyframes cupGlow{0%,100%{transform:translateY(0) scale(1);filter:drop-shadow(0 8px 12px rgba(255,215,0,.08))}50%{transform:translateY(-2px) scale(1.06);filter:drop-shadow(0 14px 18px rgba(255,215,0,.18))}}

    .match{
      position:relative;overflow:hidden;padding:20px;border-radius:32px;
      background:linear-gradient(180deg, rgba(255,255,255,.045), rgba(255,255,255,.022));
      border:1px solid rgba(255,255,255,.07);box-shadow:var(--shadow);
      animation:cardIn .55s cubic-bezier(.22,1,.36,1) both;
      transition:.32s cubic-bezier(.22,1,.36,1)
    }
    .match::before{
      content:'';position:absolute;inset:0;border-radius:inherit;pointer-events:none;
      background:radial-gradient(circle at top left, rgba(255,255,255,.08), transparent 25%), linear-gradient(135deg, rgba(255,255,255,.03), transparent 60%);
      opacity:.8;
    }
    .match::after{
      content:'';position:absolute;top:0;left:0;width:30%;height:100%;pointer-events:none;
      background:linear-gradient(90deg, transparent, rgba(255,255,255,.08), transparent);
      transform:translateX(-120%) skewX(-20deg);
    }
    .match:hover{transform:translateY(-3px);border-color:rgba(255,255,255,.12);background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03))}
    .match:hover::after{animation:shine 1.2s ease}
    .match.live{border-color:rgba(125,255,156,.20);box-shadow:0 0 0 1px rgba(125,255,156,.12), var(--shadow)}

    .meta{display:flex;align-items:center;justify-content:space-between;gap:8px;font-size:.69rem;font-weight:900;text-transform:uppercase;letter-spacing:.16em;color:var(--muted);margin-bottom:18px;position:relative;z-index:1}
    .tag{
      padding:7px 12px;border-radius:999px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);
      font-size:.68rem;font-weight:900;letter-spacing:.12em;color:var(--muted)
    }
    .tag.live{color:var(--green);border-color:rgba(125,255,156,.18);background:rgba(125,255,156,.08)}

    .score-ui{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:14px;position:relative;z-index:1}
    .team{text-align:center}
    .flag{
      display:block;font-size:54px;line-height:1;margin-bottom:12px;
      filter:drop-shadow(0 12px 20px rgba(0,0,0,.42));
      animation:floatFlag 3.2s ease-in-out infinite;
      transition:.28s cubic-bezier(.22,1,.36,1)
    }
    .match:hover .flag{transform:scale(1.08) translateY(-3px)}
    .team-name{font-size:1.08rem;font-weight:850;letter-spacing:-.04em}

    .center{text-align:center;min-width:178px}
    .score{
      display:flex;align-items:center;justify-content:center;gap:16px;
      font-size:4rem;font-weight:900;line-height:1;letter-spacing:-.08em;font-variant-numeric:tabular-nums
    }
    .cup{font-size:1.9rem;animation:cupGlow 2.6s ease-in-out infinite}
    .status{
      display:inline-flex;align-items:center;justify-content:center;gap:8px;margin-top:12px;
      min-height:34px;padding:8px 14px;border-radius:999px;background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.07);font-size:.82rem;font-weight:900;color:var(--muted)
    }
    .status.live{color:var(--green);background:rgba(125,255,156,.08);border-color:rgba(125,255,156,.20)}
    .dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulseLive 1.35s infinite}
    .status.finished{color:#d3c2ff}

    .action-wrap{margin-top:18px;position:relative;z-index:1}
    .action{
      display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;
      padding:12px;border-radius:24px;background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.05)
    }
    .steppers{display:flex;align-items:center;gap:14px;flex:1;justify-content:center;flex-wrap:wrap}
    .step-group{
      display:flex;align-items:center;gap:8px;padding:4px;
      border-radius:999px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06)
    }
    .s-btn{
      width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;
      background:rgba(255,255,255,.06);font-size:1.34rem;font-weight:800;transition:.18s cubic-bezier(.22,1,.36,1)
    }
    .s-btn:hover{background:rgba(255,255,255,.12);transform:translateY(-1px)}
    .s-btn:active{transform:scale(.92)}
    .s-btn:disabled{opacity:.3;pointer-events:none}
    .s-val{width:34px;text-align:center;font-size:1.32rem;font-weight:900;color:#fff;background:transparent}
    .divider{font-weight:900;color:rgba(255,255,255,.18)}
    .save{
      min-width:136px;padding:15px 22px;border-radius:999px;
      background:linear-gradient(180deg,#fff,#dcdcdc);color:#000;font-size:.9rem;font-weight:900;
      box-shadow:0 16px 34px rgba(255,255,255,.10), inset 0 1px 0 rgba(255,255,255,.9);
      transition:.22s cubic-bezier(.22,1,.36,1)
    }
    .save:hover:not(:disabled){transform:translateY(-1px) scale(1.01)}
    .save:active:not(:disabled){transform:scale(.97)}
    .save:disabled,.save.locked{background:rgba(255,255,255,.08);color:var(--muted);box-shadow:none}

    .chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;position:relative;z-index:1}
    .chip{
      display:flex;align-items:center;gap:6px;padding:8px 12px;border-radius:999px;
      background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.06);
      color:var(--muted);font-size:.76rem;font-weight:800;transition:.2s ease
    }
    .chip:hover{transform:translateY(-1px)}
    .chip.good{background:rgba(125,255,156,.10);border-color:rgba(125,255,156,.16);color:var(--green)}
    .chip.exact{background:#fff;color:#000;border-color:#fff;box-shadow:0 10px 22px rgba(255,255,255,.10)}

    .empty{
      padding:58px 20px;border-radius:28px;text-align:center;font-weight:800;color:var(--muted);
      background:rgba(255,255,255,.03);border:1px dashed rgba(255,255,255,.12)
    }

    .modal-overlay{
      position:fixed;inset:0;display:none;align-items:center;justify-content:center;padding:18px;
      background:rgba(0,0,0,.76);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);z-index:100
    }
    .modal-overlay.open{display:flex}
    .modal{
      width:min(460px,100%);padding:26px;border-radius:30px;
      background:linear-gradient(180deg, rgba(18,18,18,.96), rgba(10,10,10,.96));
      border:1px solid rgba(255,255,255,.08);box-shadow:var(--shadow)
    }
    .m-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px}
    .m-title{font-size:1.2rem;font-weight:900;letter-spacing:-.05em}
    .leader-row{display:grid;grid-template-columns:42px 1fr auto;align-items:center;gap:12px;padding:14px 0;border-top:1px solid rgba(255,255,255,.06)}
    .leader-row:first-child{border-top:none}
    .rank{font-size:1.2rem;text-align:center}
    .lname{font-size:.98rem;font-weight:900}.lsub{font-size:.76rem;color:var(--muted);margin-top:2px}.pts{font-size:1.8rem;font-weight:900;letter-spacing:-.06em}

    .toast{
      position:fixed;top:22px;left:50%;transform:translate(-50%,-100px);
      padding:13px 22px;border-radius:999px;background:#fff;color:#000;font-size:.88rem;font-weight:900;
      box-shadow:0 20px 40px rgba(0,0,0,.45);transition:.28s cubic-bezier(.22,1,.36,1);z-index:140
    }
    .toast.show{transform:translate(-50%,0)}

    @media(max-width:720px){
      .player-tabs{grid-template-columns:repeat(2,1fr)}
      .score-ui{grid-template-columns:1fr;gap:12px}
      .center{order:-1}
      .score{font-size:3.15rem}
      .flag{font-size:48px}
      .action{align-items:stretch}
      .save{width:100%}
      .steppers{width:100%}
      .controls-shell{top:70px}
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="wrap topbar-in">
      <button class="leader-btn" id="boardBtn">Leaderboard</button>
    </div>
  </header>

  <main class="wrap hero-pad">
    <section class="controls-shell">
      <div class="player-tabs" id="playerTabs"></div>
      <div class="filters">
        <button class="filter active" data-view="upcoming">Upcoming</button>
        <button class="filter" data-view="live">Live</button>
        <button class="filter" data-view="finished">Finished</button>
        <button class="filter" data-view="all">All</button>
      </div>
    </section>

    <section class="list" id="matchList"></section>
  </main>

  <div class="modal-overlay" id="boardModal">
    <div class="modal">
      <div class="m-head">
        <div class="m-title">Standings</div>
        <button class="leader-btn" id="closeBoard">Close</button>
      </div>
      <div id="leaderRows"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getDatabase, ref, set, onValue } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js';

const app = initializeApp({
  apiKey:'AIzaSyB3T6VN31aw7bezi7wJh9kBSdTuOdAfHGo',
  authDomain:'pishbini-bazi-ha.firebaseapp.com',
  databaseURL:'https://pishbini-bazi-ha-default-rtdb.firebaseio.com',
  projectId:'pishbini-bazi-ha',
  storageBucket:'pishbini-bazi-ha.firebasestorage.app',
  messagingSenderId:'195538591321',
  appId:'1:195538591321:web:63a099506ee9a1b3a49b48'
});
const db = getDatabase(app);

const PLAYERS = [
  {id:'HANBA',ava:'✦'},
  {id:'YASIN BAMBA',ava:'◈'},
  {id:'AMA BAMBA',ava:'◆'},
  {id:'KAMBAB',ava:'✳'}
];
const FLAGS = {'Argentina':'🇦🇷','Australia':'🇦🇺','Belgium':'🇧🇪','Bolivia':'🇧🇴','Bosnia and Herzegovina':'🇧🇦','Brazil':'🇧🇷','Canada':'🇨🇦','Cameroon':'🇨🇲','Cape Verde':'🇨🇻','Chile':'🇨🇱','Colombia':'🇨🇴','Costa Rica':'🇨🇷','Croatia':'🇭🇷','Czech Republic':'🇨🇿','Denmark':'🇩🇰','Ecuador':'🇪🇨','Egypt':'🇪🇬','England':'🏴','France':'🇫🇷','Germany':'🇩🇪','Ghana':'🇬🇭','Guatemala':'🇬🇹','Honduras':'🇭🇳','Iceland':'🇮🇸','Iran':'🇮🇷','Jamaica':'🇯🇲','Japan':'🇯🇵','Mali':'🇲🇱','Mexico':'🇲🇽','Morocco':'🇲🇦','Netherlands':'🇳🇱','New Zealand':'🇳🇿','Nigeria':'🇳🇬','Norway':'🇳🇴','Panama':'🇵🇦','Paraguay':'🇵🇾','Peru':'🇵🇪','Poland':'🇵🇱','Portugal':'🇵🇹','Qatar':'🇶🇦','Saudi Arabia':'🇸🇦','Scotland':'🏴','Senegal':'🇸🇳','Serbia':'🇷🇸','South Africa':'🇿🇦','South Korea':'🇰🇷','Spain':'🇪🇸','Sweden':'🇸🇪','Switzerland':'🇨🇭','Tunisia':'🇹🇳','Turkey':'🇹🇷','Ukraine':'🇺🇦','United States':'🇺🇸','USA':'🇺🇸','Uruguay':'🇺🇾','Uzbekistan':'🇺🇿','Venezuela':'🇻🇪','Wales':'🏴'};
const state = {player:'HANBA',view:'upcoming',fixtures:{},results:{},livescores:{},predictions:{}};
const $ = id => document.getElementById(id);

window.stepVal = (id, delta) => {
  const el = $(id);
  if(!el || el.disabled) return;
  let v = parseInt(el.value || 0) + delta;
  if(v < 0) v = 0;
  if(v > 20) v = 20;
  el.value = v;
  if(navigator.vibrate) navigator.vibrate(10);
};

function parseRawDate(raw){
  if(!raw) return null;
  const s = String(raw).trim();
  if(!s) return null;
  const [datePart, timePart='00:00'] = s.split(' ');
  let y,m,d;
  if(datePart.includes('/')){
    const p = datePart.split('/').map(Number);
    if(p.length !== 3 || p.some(Number.isNaN)) return null;
    if(String(p[0]).length === 4) [y,m,d] = p; else [m,d,y] = p;
  } else if(datePart.includes('-')){
    const p = datePart.split('-').map(Number);
    if(p.length !== 3 || p.some(Number.isNaN)) return null;
    [y,m,d] = p;
  } else return null;
  const [hh='00', mm='00'] = timePart.split(':');
  const dt = new Date(Date.UTC(y, m - 1, d, Number(hh), Number(mm), 0));
  return isNaN(dt.getTime()) ? null : dt;
}
function startTs(m){ const d = parseRawDate(m.local_date); return d ? d.getTime() : 0; }
function hasStarted(m){ const ts = startTs(m); return ts ? Date.now() >= ts : false; }
function isFinished(m){ return String(m.finished || '').toUpperCase() === 'TRUE'; }
function isLive(m){ return !isFinished(m) && !!state.livescores[String(m.id)]; }
function resultDir(a,b){ return a===b ? 0 : a>b ? 1 : -1; }
function calcPoints(pid){ let pts=0; Object.entries(state.results || {}).forEach(([id,r])=>{ const p=state.predictions?.[pid]?.[id]; if(!p) return; if(+p.g1===+r.g1 && +p.g2===+r.g2) pts+=3; else if(resultDir(+p.g1,+p.g2)===resultDir(+r.g1,+r.g2)) pts+=1; }); return pts; }

function showToast(msg){
  const t = $('toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(window.__toastTimer); window.__toastTimer = setTimeout(()=>t.classList.remove('show'), 2100);
}

function renderAll(){
  $('playerTabs').innerHTML = PLAYERS.map(p => `<button class="p-tab ${state.player===p.id?'active':''}" data-player="${p.id}"><span class="p-ava">${p.ava}</span>${p.id.split(' ')[0]}</button>`).join('');
  document.querySelectorAll('.p-tab').forEach(btn => { btn.onclick = () => { state.player = btn.dataset.player; renderAll(); }; });
  document.querySelectorAll('.filter').forEach(btn => { btn.classList.toggle('active', btn.dataset.view===state.view); btn.onclick = () => { state.view = btn.dataset.view; renderAll(); }; });

  const all = Object.values(state.fixtures || {}).filter(m => m && m.home_name && m.away_name);
  let visible = all;
  if(state.view==='upcoming') visible = all.filter(m => !isFinished(m) && !hasStarted(m));
  if(state.view==='live') visible = all.filter(m => isLive(m));
  if(state.view==='finished') visible = all.filter(m => isFinished(m));
  visible.sort((a,b) => startTs(a) - startTs(b));

  if(!visible.length){ $('matchList').innerHTML = `<div class="empty">No matches found.</div>`; updateLeaderboard(); return; }

  $('matchList').innerHTML = visible.map((m,i) => {
    const id = String(m.id);
    const live = isLive(m), fin = isFinished(m), started = hasStarted(m);
    const ls = state.livescores?.[id], res = state.results?.[id], myPred = state.predictions?.[state.player]?.[id];
    let g1='0', g2='0', status='';
    if(fin && res){ g1=res.g1; g2=res.g2; status = `<div class="status finished">FT</div>`; }
    else if(live && ls){ g1=ls.g1; g2=ls.g2; status = `<div class="status live"><span class="dot"></span>${ls.minute || 'LIVE'}</div>`; }
    else { status = `<div class="status">Upcoming</div>`; }

    const preds = PLAYERS.map(p => {
      const pr = state.predictions?.[p.id]?.[id];
      if(!pr) return '';
      let cls = 'chip';
      if(fin && res){
        if(+pr.g1===+res.g1 && +pr.g2===+res.g2) cls += ' exact';
        else if(resultDir(+pr.g1,+pr.g2)===resultDir(+res.g1,+res.g2)) cls += ' good';
      }
      return `<div class="${cls}">${p.ava} ${pr.g1}-${pr.g2}</div>`;
    }).join('');

    return `
      <article class="match ${live?'live':''}" style="animation-delay:${i*0.05}s">
        <div class="meta">
          <span>Group ${m.group || '-'}</span>
          <span class="tag ${live?'live':''}">${started?'Locked':'Open'}</span>
        </div>
        <div class="score-ui">
          <div class="team"><span class="flag">${FLAGS[m.home_name] || '🏳️'}</span><div class="team-name">${m.home_name}</div></div>
          <div class="center"><div class="score"><span>${g1}</span><span class="cup">🏆</span><span>${g2}</span></div>${status}</div>
          <div class="team"><span class="flag">${FLAGS[m.away_name] || '🏳️'}</span><div class="team-name">${m.away_name}</div></div>
        </div>
        <div class="action-wrap">
          <div class="action">
            <div class="steppers">
              <div class="step-group"><button class="s-btn" onclick="window.stepVal('g1-${id}',-1)" ${started?'disabled':''}>−</button><input id="g1-${id}" class="s-val" type="number" value="${myPred?.g1 ?? 0}" readonly ${started?'disabled':''}><button class="s-btn" onclick="window.stepVal('g1-${id}',1)" ${started?'disabled':''}>+</button></div>
              <div class="divider">:</div>
              <div class="step-group"><button class="s-btn" onclick="window.stepVal('g2-${id}',-1)" ${started?'disabled':''}>−</button><input id="g2-${id}" class="s-val" type="number" value="${myPred?.g2 ?? 0}" readonly ${started?'disabled':''}><button class="s-btn" onclick="window.stepVal('g2-${id}',1)" ${started?'disabled':''}>+</button></div>
            </div>
            <button class="save ${started?'locked':''}" data-id="${id}" ${started?'disabled':''}>${started?'Locked':'Save Pick'}</button>
          </div>
          ${preds ? `<div class="chips">${preds}</div>` : ''}
        </div>
      </article>`;
  }).join('');

  document.querySelectorAll('.save:not(:disabled)').forEach(btn => {
    btn.onclick = async () => {
      const id = btn.dataset.id;
      const v1 = $(`g1-${id}`).value;
      const v2 = $(`g2-${id}`).value;
      if(navigator.vibrate) navigator.vibrate([20,30,20]);
      btn.textContent = 'Saving...';
      await set(ref(db, `worldcup/shared/predictions/${state.player}/${id}`), { g1:+v1, g2:+v2, ts:Date.now() });
      btn.textContent = 'Saved ✓';
      setTimeout(()=> btn.textContent = 'Save Pick', 1500);
      showToast(`${state.player.split(' ')[0]}: ${v1}-${v2}`);
    };
  });

  updateLeaderboard();
}

function updateLeaderboard(){
  const rows = PLAYERS.map(p => ({ name:p.id, ava:p.ava, pts:calcPoints(p.id), picks:Object.keys(state.predictions?.[p.id] || {}).length }))
    .sort((a,b) => b.pts - a.pts || b.picks - a.picks);
  $('leaderRows').innerHTML = rows.map((r,i) => `
    <div class="leader-row">
      <div class="rank">${i===0?'👑':i+1}</div>
      <div><div class="lname">${r.ava} ${r.name}</div><div class="lsub">${r.picks} picks</div></div>
      <div class="pts">${r.pts}</div>
    </div>`).join('');
}

$('boardBtn').onclick = () => $('boardModal').classList.add('open');
$('closeBoard').onclick = () => $('boardModal').classList.remove('open');
$('boardModal').onclick = e => { if(e.target.id === 'boardModal') e.currentTarget.classList.remove('open'); };

onValue(ref(db, 'worldcup/shared'), snap => {
  const d = snap.val() || {};
  state.fixtures = d.fixtures || {};
  state.results = d.results || {};
  state.livescores = d.livescores || {};
  state.predictions = d.predictions || {};
  renderAll();
});
</script>
</body>
</html>
