<!DOCTYPE html>
<html lang="fa" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover" />
  <title>Pishbini Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#f4f4f6;
      --card:#ffffff;
      --border:#e8e8ec;
      --text:#111111;
      --muted:#8e8e98;
      --accent:#2b7fff;
      --green:#20b04b;
      --green-bg:#edf7f1;
      --red:#e63946;
      --red-bg:#fdf0f1;
      --orange:#f0820f;
      --orange-bg:#fef4e8;
      --pill:#f0f0f5;
      --font:'Inter',system-ui,sans-serif;
      --radius:18px;
      --radius-sm:10px;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation;margin:0;padding:0}
    html{-webkit-font-smoothing:antialiased;background:var(--bg);overscroll-behavior-y:none}
    body{min-height:100vh;font-family:var(--font);color:var(--text);background:var(--bg);padding-bottom:calc(88px + env(safe-area-inset-bottom));overflow-x:hidden}
    button,input{font:inherit;color:inherit;border:none;background:none;outline:none;cursor:pointer}

    /* ── TOPBAR ── */
    .topbar{position:sticky;top:0;z-index:60;background:rgba(244,244,246,.96);border-bottom:1px solid var(--border);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}
    .topbar-inner{max-width:680px;margin:0 auto;padding:0 16px;display:flex;justify-content:space-between;align-items:center;height:58px;gap:10px}
    .tb-left{display:flex;align-items:center;gap:10px;min-width:0;flex:1}
    .tb-logo{font-size:1.15rem;font-weight:900;letter-spacing:-.04em;color:var(--text)}
    .selected-badge{display:flex;align-items:center;gap:6px;background:var(--pill);border-radius:999px;padding:5px 12px 5px 8px;min-width:0}
    .selected-badge.hidden{display:none}
    .badge-ava{font-size:.9rem}
    .badge-name{font-size:.82rem;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:120px}
    .tb-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
    .tb-btn{height:36px;padding:0 14px;border-radius:999px;background:var(--pill);font-size:.8rem;font-weight:800;color:var(--text);display:flex;align-items:center;gap:6px;white-space:nowrap}
    .tb-btn:active{opacity:.7}
    .tb-btn.primary{background:var(--text);color:#fff}

    /* ── DATE BAR ── */
    .datebar{max-width:680px;margin:0 auto;padding:0 16px;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;height:46px;align-items:center}
    .datebar::-webkit-scrollbar{display:none}
    .day-btn{height:32px;padding:0 14px;border-radius:999px;font-size:.82rem;font-weight:700;color:var(--muted);white-space:nowrap;flex-shrink:0;transition:background .14s,color .14s}
    .day-btn.active{background:var(--text);color:#fff;font-weight:800}

    /* ── PLAYER PICKER ── */
    .picker-wrap{max-width:680px;margin:0 auto;padding:14px 16px 0}
    .picker-card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden}
    .picker-card.hidden{display:none}
    .picker-head{padding:14px 16px 10px;border-bottom:1px solid var(--border)}
    .pink-3d{display:inline-block;font-size:clamp(1.25rem,5vw,1.9rem);font-weight:900;letter-spacing:-.04em;line-height:1;color:#ffd7f3;text-shadow:0 1px 0 #ffb5e5,0 2px 0 #ff8fd8,0 3px 0 #ff71cf,0 4px 0 #ff57c7,0 8px 16px rgba(255,79,195,.32);transform:perspective(500px) rotateX(12deg);display:block}
    .picker-sub{font-size:.75rem;color:var(--muted);margin-top:6px;font-weight:600}
    .picker-grid{display:grid;grid-template-columns:1fr 1fr;gap:0}
    .p-btn{display:flex;align-items:center;gap:10px;padding:13px 16px;border-bottom:1px solid var(--border);border-right:1px solid var(--border);font-size:.9rem;font-weight:700;transition:background .13s}
    .p-btn:nth-child(2n){border-right:none}
    .p-btn:nth-last-child(-n+2){border-bottom:none}
    .p-btn:active{background:var(--bg)}
    .p-ava{width:34px;height:34px;border-radius:50%;background:var(--pill);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0}

    /* ── SECTION ── */
    .section{max-width:680px;margin:14px auto 0;padding:0 16px}
    .section-head{font-size:.7rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;padding-left:2px}

    /* ── MATCH CARD (FotMob style) ── */
    .match-group{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;margin-bottom:10px}
    .group-head{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
    .group-icon{width:24px;height:24px;border-radius:50%;background:var(--pill);display:flex;align-items:center;justify-content:center;font-size:.8rem;flex-shrink:0}
    .group-name{font-size:.82rem;font-weight:800;color:var(--text)}
    .group-sub{font-size:.75rem;color:var(--muted);margin-left:auto}

    .match-row{display:flex;align-items:center;padding:13px 14px;border-bottom:1px solid var(--border);gap:10px;transition:background .12s}
    .match-row:last-child{border-bottom:none}
    .match-row:active{background:var(--bg)}

    .match-status{width:38px;flex-shrink:0;text-align:center}
    .ms-ft{font-size:.7rem;font-weight:800;color:var(--muted);letter-spacing:.04em}
    .ms-live{font-size:.7rem;font-weight:900;color:var(--green);letter-spacing:.04em}
    .ms-time{font-size:.75rem;font-weight:700;color:var(--muted);line-height:1.3}

    .match-teams{flex:1;min-width:0}
    .team-line{display:flex;align-items:center;gap:8px;padding:2px 0}
    .t-flag{font-size:1.15rem;line-height:1;flex-shrink:0}
    .t-name{font-size:.92rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .t-name.winner{font-weight:800}

    .match-scores{display:flex;flex-direction:column;gap:4px;align-items:center;flex-shrink:0;min-width:28px}
    .ms-score{font-size:.92rem;font-weight:800;line-height:1;text-align:center;color:var(--text)}
    .ms-score.winner{color:var(--text)}
    .ms-score.empty{color:var(--muted);font-weight:600}

    /* prediction inline */
    .match-pick{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:4px}
    .pick-stepper{display:flex;align-items:center;gap:0;background:var(--pill);border-radius:999px;height:30px;overflow:hidden}
    .ps-btn{width:28px;height:30px;display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:800;color:var(--muted)}
    .ps-btn:active{background:rgba(0,0,0,.06)}
    .ps-btn:disabled{opacity:.3;pointer-events:none}
    .ps-val{width:22px;text-align:center;font-size:.88rem;font-weight:900;color:var(--text);background:none;border:none}
    .pick-vs{font-size:.7rem;font-weight:800;color:var(--muted)}
    .pick-save{height:30px;padding:0 12px;border-radius:999px;background:var(--text);color:#fff;font-size:.75rem;font-weight:800;margin-top:2px;white-space:nowrap}
    .pick-save:disabled{background:var(--pill);color:var(--muted)}
    .pick-save.saved{background:var(--green-bg);color:var(--green)}
    .pick-locked{height:30px;padding:0 10px;border-radius:999px;background:var(--pill);color:var(--muted);font-size:.72rem;font-weight:800;display:flex;align-items:center}

    /* chips */
    .pick-chips{display:flex;gap:5px;flex-wrap:wrap;padding:6px 14px 10px;border-top:1px solid var(--border)}
    .pchip{height:24px;padding:0 9px;border-radius:999px;font-size:.7rem;font-weight:800;display:inline-flex;align-items:center;gap:4px;background:var(--pill);color:var(--muted)}
    .pchip.good{background:var(--green-bg);color:var(--green)}
    .pchip.exact{background:var(--text);color:#fff}

    /* ── MUSIC DOCK ── */
    .music-dock{position:fixed;left:50%;bottom:14px;transform:translateX(-50%);z-index:90;width:min(calc(100vw - 20px),560px);padding:10px 14px;border-radius:22px;background:rgba(255,255,255,.97);border:1px solid var(--border);box-shadow:0 8px 28px rgba(0,0,0,.10);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px)}
    .music-row{display:grid;grid-template-columns:auto auto 1fr auto;align-items:center;gap:10px}
    .music-btn{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--pill);font-size:.92rem;font-weight:900}
    .music-meta{min-width:0}.music-title{font-size:.8rem;font-weight:800;line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.music-sub{font-size:.68rem;color:var(--muted);margin-top:3px}
    .visualizer{display:flex;align-items:flex-end;justify-content:center;gap:4px;width:90px;height:36px;border-radius:12px;background:var(--pill);padding:0 6px;overflow:hidden}
    .bar{width:8px;height:10px;border-radius:999px 999px 3px 3px;transform-origin:bottom center;background:linear-gradient(180deg,#ff9de1,#ff4fc3);transition:height .1s linear,background .16s linear,filter .14s linear}
    .bar.alt{background:linear-gradient(180deg,#b8ffd0,#20b04b)}
    .bar.idle{height:8px;opacity:.5}

    /* ── MODAL ── */
    .modal-overlay{position:fixed;inset:0;z-index:100;display:none;align-items:flex-end;justify-content:center;background:rgba(0,0,0,.35)}.modal-overlay.open{display:flex}
    .modal{width:min(540px,100%);max-height:80vh;overflow:auto;border-radius:26px 26px 0 0;background:#fff;border-top:1px solid var(--border);padding:18px 18px calc(20px + env(safe-area-inset-bottom))}
    .m-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:12px}.m-title{font-size:1.05rem;font-weight:900}
    .close-btn{height:36px;padding:0 14px;border-radius:999px;background:var(--pill);font-size:.8rem;font-weight:800}
    .leader-row{display:grid;grid-template-columns:36px 1fr auto;gap:10px;align-items:center;padding:12px 0;border-top:1px solid var(--border)}.leader-row:first-child{border-top:none}.rank{font-size:1.1rem;text-align:center}.lname{font-size:.9rem;font-weight:800}.lsub{font-size:.72rem;color:var(--muted);margin-top:2px}.pts{font-size:1.5rem;font-weight:900;color:var(--text)}

    /* toast */
    .toast{position:fixed;left:50%;top:16px;z-index:120;transform:translate(-50%,-110px);padding:11px 18px;border-radius:999px;background:var(--text);color:#fff;font-size:.82rem;font-weight:800;box-shadow:0 10px 28px rgba(0,0,0,.18);transition:transform .22s ease;max-width:calc(100vw - 26px);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.toast.show{transform:translate(-50%,0)}

    @media(min-width:700px){.picker-grid{grid-template-columns:repeat(4,1fr)}.modal-overlay{align-items:center}.modal{border-radius:24px;max-height:78vh}}
    @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}
  </style>
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <div class="tb-left">
      <span class="tb-logo">⚽ Pishbini</span>
      <div class="selected-badge hidden" id="selectedBadge">
        <span class="badge-ava" id="badgeAva"></span>
        <span class="badge-name" id="badgeName"></span>
      </div>
    </div>
    <div class="tb-right">
      <button class="tb-btn" id="changeBtn" style="display:none">Change</button>
      <button class="tb-btn primary" id="boardBtn">🏆 Standings</button>
    </div>
  </div>
</header>

<div class="datebar">
  <button class="day-btn" data-view="finished">Yesterday</button>
  <button class="day-btn active" data-view="upcoming">Today</button>
  <button class="day-btn" data-view="live">Live</button>
  <button class="day-btn" data-view="all">All</button>
</div>

<div class="picker-wrap">
  <div class="picker-card" id="pickerCard">
    <div class="picker-head">
      <span class="pink-3d">Rooye esmet Bezan</span>
      <div class="picker-sub">Choose your name to start predicting</div>
    </div>
    <div class="picker-grid" id="pickerGrid"></div>
  </div>
</div>

<div class="section" id="matchSection">
  <div class="section-head" id="sectionLabel">Upcoming Matches</div>
  <div id="matchList"></div>
</div>

<div class="music-dock">
  <div class="music-row">
    <button class="music-btn" id="playPauseBtn">▶</button>
    <button class="music-btn" id="muteBtn">🔊</button>
    <div class="music-meta">
      <div class="music-title">Background Music</div>
      <div class="music-sub" id="musicState">Tap to play</div>
    </div>
    <div class="visualizer" id="visualizer">
      <span class="bar idle"></span><span class="bar alt idle"></span><span class="bar idle"></span><span class="bar alt idle"></span><span class="bar idle"></span><span class="bar alt idle"></span><span class="bar idle"></span>
    </div>
  </div>
</div>

<div class="modal-overlay" id="boardModal">
  <div class="modal">
    <div class="m-head"><div class="m-title">🏆 Standings</div><button class="close-btn" id="closeBoard">Close</button></div>
    <div id="leaderRows"></div>
  </div>
</div>

<div class="toast" id="toast"></div>
<audio id="bgMusic" preload="auto" loop playsinline autoplay src="music.mp3"></audio>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getDatabase, ref, set, onValue } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js';
const app = initializeApp({apiKey:'AIzaSyB3T6VN31aw7bezi7wJh9kBSdTuOdAfHGo',authDomain:'pishbini-bazi-ha.firebaseapp.com',databaseURL:'https://pishbini-bazi-ha-default-rtdb.firebaseio.com',projectId:'pishbini-bazi-ha',storageBucket:'pishbini-bazi-ha.firebasestorage.app',messagingSenderId:'195538591321',appId:'1:195538591321:web:63a099506ee9a1b3a49b48'});
const db = getDatabase(app);

const PLAYERS=[{id:'HANBA',ava:'✦'},{id:'YASIN BAMBA',ava:'◈'},{id:'AMA BAMBA',ava:'◆'},{id:'KAMBAB',ava:'✳'}];
const FLAGS={'Argentina':'🇦🇷','Australia':'🇦🇺','Belgium':'🇧🇪','Bolivia':'🇧🇴','Bosnia and Herzegovina':'🇧🇦','Brazil':'🇧🇷','Canada':'🇨🇦','Cameroon':'🇨🇲','Cape Verde':'🇨🇻','Chile':'🇨🇱','Colombia':'🇨🇴','Costa Rica':'🇨🇷','Croatia':'🇭🇷','Czech Republic':'🇨🇿','Denmark':'🇩🇰','Ecuador':'🇪🇨','Egypt':'🇪🇬','England':'🏴','France':'🇫🇷','Germany':'🇩🇪','Ghana':'🇬🇭','Guatemala':'🇬🇹','Honduras':'🇭🇳','Iceland':'🇮🇸','Iran':'🇮🇷','Jamaica':'🇯🇲','Japan':'🇯🇵','Mali':'🇲🇱','Mexico':'🇲🇽','Morocco':'🇲🇦','Netherlands':'🇳🇱','New Zealand':'🇳🇿','Nigeria':'🇳🇬','Norway':'🇳🇴','Panama':'🇵🇦','Paraguay':'🇵🇾','Peru':'🇵🇪','Poland':'🇵🇱','Portugal':'🇵🇹','Qatar':'🇶🇦','Saudi Arabia':'🇸🇦','Scotland':'🏴','Senegal':'🇸🇳','Serbia':'🇷🇸','South Africa':'🇿🇦','South Korea':'🇰🇷','Spain':'🇪🇸','Sweden':'🇸🇪','Switzerland':'🇨🇭','Tunisia':'🇹🇳','Turkey':'🇹🇷','Ukraine':'🇺🇦','United States':'🇺🇸','USA':'🇺🇸','Uruguay':'🇺🇾','Uzbekistan':'🇺🇿','Venezuela':'🇻🇪','Wales':'🏴','Czechia':'🇨🇿','Czech Republic':'🇨🇿'};

const state={player:null,view:'upcoming',fixtures:{},results:{},livescores:{},predictions:{}};
const $=id=>document.getElementById(id);

window.stepVal=(id,delta)=>{const el=$(id);if(!el||el.disabled)return;let v=parseInt(el.value||0,10)+delta;if(v<0)v=0;if(v>20)v=20;el.value=v;if(navigator.vibrate)navigator.vibrate(8);};

function parseRawDate(raw){if(!raw)return null;const s=String(raw).trim();if(!s)return null;const[datePart,timePart='00:00']=s.split(' ');let y,m,d;if(datePart.includes('/')){const p=datePart.split('/').map(Number);if(p.length!==3||p.some(Number.isNaN))return null;if(String(p[0]).length===4)[y,m,d]=p;else[m,d,y]=p;}else if(datePart.includes('-')){const p=datePart.split('-').map(Number);if(p.length!==3||p.some(Number.isNaN))return null;[y,m,d]=p;}else return null;const[hh='00',mm='00']=timePart.split(':');const dt=new Date(Date.UTC(y,m-1,d,Number(hh),Number(mm),0));return isNaN(dt.getTime())?null:dt;}
function startTs(m){const d=parseRawDate(m.local_date);return d?d.getTime():0;}
function hasStarted(m){const ts=startTs(m);return ts?Date.now()>=ts:false;}
function isFinished(m){return String(m.finished||'').toUpperCase()==='TRUE';}
function isLive(m){return!isFinished(m)&&!!state.livescores[String(m.id)];}
function resultDir(a,b){return a===b?0:a>b?1:-1;}
function calcPoints(pid){let pts=0;Object.entries(state.results||{}).forEach(([id,r])=>{const p=state.predictions?.[pid]?.[id];if(!p)return;if(+p.g1===+r.g1&&+p.g2===+r.g2)pts+=3;else if(resultDir(+p.g1,+p.g2)===resultDir(+r.g1,+r.g2))pts+=1;});return pts;}
function showToast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');clearTimeout(window.__tt);window.__tt=setTimeout(()=>t.classList.remove('show'),1800);}

function syncPlayerUI(){
  const s=!!state.player;
  $('pickerCard').classList.toggle('hidden',s);
  $('selectedBadge').classList.toggle('hidden',!s);
  $('changeBtn').style.display=s?'flex':'none';
  if(state.player){
    const p=PLAYERS.find(x=>x.id===state.player);
    $('badgeAva').textContent=p?.ava||'';
    $('badgeName').textContent=state.player;
  }
}

function renderPlayers(){
  $('pickerGrid').innerHTML=PLAYERS.map(p=>`
    <button class="p-btn" data-player="${p.id}">
      <div class="p-ava">${p.ava}</div>
      <span>${p.id}</span>
    </button>`).join('');
  document.querySelectorAll('.p-btn').forEach(btn=>{
    btn.onclick=()=>{state.player=btn.dataset.player;syncPlayerUI();renderMatches();unlockAndAutoplayMusic();if(navigator.vibrate)navigator.vibrate([14,18,14]);showToast(`${state.player.split(' ')[0]} selected`);};
  });
}

function renderFilters(){
  document.querySelectorAll('.day-btn').forEach(btn=>{
    btn.classList.toggle('active',btn.dataset.view===state.view);
    btn.onclick=()=>{state.view=btn.dataset.view;renderMatches();renderFilters();};
  });
  const labels={upcoming:'Upcoming Matches',live:'Live Now',finished:'Finished Matches',all:'All Matches'};
  $('sectionLabel').textContent=labels[state.view]||'Matches';
}

function groupByGroup(arr){
  const map={};
  arr.forEach(m=>{const g=m.group||'Other';if(!map[g])map[g]=[];map[g].push(m);});
  return map;
}

function fmtTime(m){
  const d=parseRawDate(m.local_date);
  if(!d)return'';
  return d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',hour12:true});
}

function renderMatches(){
  const all=Object.values(state.fixtures||{}).filter(m=>m&&m.home_name&&m.away_name);
  let visible=all;
  if(state.view==='upcoming')visible=all.filter(m=>!isFinished(m)&&!hasStarted(m));
  if(state.view==='live')visible=all.filter(m=>isLive(m));
  if(state.view==='finished')visible=all.filter(m=>isFinished(m));
  visible.sort((a,b)=>startTs(a)-startTs(b));
  const root=$('matchList');
  if(!visible.length){root.innerHTML='<div style="text-align:center;padding:40px 0;color:var(--muted);font-size:.9rem;font-weight:700">No matches found</div>';return;}

  const groups=groupByGroup(visible);
  root.innerHTML=Object.entries(groups).map(([grp,matches])=>{
    const rows=matches.map(m=>{
      const id=String(m.id);
      const live=isLive(m),fin=isFinished(m),started=hasStarted(m);
      const ls=state.livescores?.[id];
      const res=state.results?.[id];
      const myPred=state.player?state.predictions?.[state.player]?.[id]:null;
      const cannotSave=started||!state.player;

      let statusHtml='';
      let g1='-',g2='-';
      let h1w=false,h2w=false;

      if(fin&&res){
        g1=res.g1;g2=res.g2;
        h1w=+res.g1>+res.g2;h2w=+res.g2>+res.g1;
        statusHtml=`<div class="ms-ft">FT</div>`;
      }else if(live&&ls){
        g1=ls.g1;g2=ls.g2;
        statusHtml=`<div class="ms-live">LIVE</div><div style="font-size:.68rem;color:var(--green);font-weight:800">${ls.minute||''}</div>`;
      }else{
        statusHtml=`<div class="ms-time">${fmtTime(m).replace(' ','<br>')}</div>`;
      }

      const preds=PLAYERS.map(p=>{
        const pr=state.predictions?.[p.id]?.[id];
        if(!pr)return'';
        let cls='pchip';
        if(fin&&res){if(+pr.g1===+res.g1&&+pr.g2===+res.g2)cls+=' exact';else if(resultDir(+pr.g1,+pr.g2)===resultDir(+res.g1,+res.g2))cls+=' good';}
        return`<span class="${cls}">${p.ava} ${pr.g1}-${pr.g2}</span>`;
      }).join('');

      const pickHtml=cannotSave
        ?`<div class="match-pick"><div class="pick-locked">${started?'Locked 🔒':'Pick player'}</div></div>`
        :`<div class="match-pick">
            <div style="display:flex;align-items:center;gap:5px">
              <div class="pick-stepper"><button class="ps-btn" onclick="window.stepVal('g1-${id}',-1)">−</button><input id="g1-${id}" class="ps-val" type="number" value="${myPred?.g1??0}" readonly><button class="ps-btn" onclick="window.stepVal('g1-${id}',1)">+</button></div>
              <span class="pick-vs">:</span>
              <div class="pick-stepper"><button class="ps-btn" onclick="window.stepVal('g2-${id}',-1)">−</button><input id="g2-${id}" class="ps-val" type="number" value="${myPred?.g2??0}" readonly><button class="ps-btn" onclick="window.stepVal('g2-${id}',1)">+</button></div>
            </div>
            <button class="pick-save" data-id="${id}">Save</button>
          </div>`;

      return`<div class="match-row">
        <div class="match-status">${statusHtml}</div>
        <div class="match-teams">
          <div class="team-line"><span class="t-flag">${FLAGS[m.home_name]||'🏳️'}</span><span class="t-name ${h1w?'winner':''}">${m.home_name}</span></div>
          <div class="team-line"><span class="t-flag">${FLAGS[m.away_name]||'🏳️'}</span><span class="t-name ${h2w?'winner':''}">${m.away_name}</span></div>
        </div>
        <div class="match-scores">
          <span class="ms-score ${g1!=='-'?'':'empty'}">${g1}</span>
          <span class="ms-score ${g2!=='-'?'':'empty'}">${g2}</span>
        </div>
        ${pickHtml}
      </div>
      ${preds?`<div class="pick-chips">${preds}</div>`:''}`;
    }).join('');

    return`<div class="match-group">
      <div class="group-head">
        <div class="group-icon">⚽</div>
        <div class="group-name">FIFA World Cup</div>
        <div class="group-sub">Group ${grp}</div>
      </div>
      ${rows}
    </div>`;
  }).join('');

  root.querySelectorAll('.pick-save').forEach(btn=>{
    btn.onclick=async()=>{
      const id=btn.dataset.id;
      const v1=$(`g1-${id}`).value,v2=$(`g2-${id}`).value;
      btn.textContent='...';btn.disabled=true;
      await set(ref(db,`worldcup/shared/predictions/${state.player}/${id}`),{g1:+v1,g2:+v2,ts:Date.now()});
      btn.textContent='✓';btn.classList.add('saved');
      setTimeout(()=>{btn.textContent='Save';btn.disabled=false;btn.classList.remove('saved');},1400);
      if(navigator.vibrate)navigator.vibrate([16,20,16]);
      showToast(`${state.player.split(' ')[0]}: ${v1}–${v2}`);
    };
  });
}

function updateLeaderboard(){
  const rows=PLAYERS.map(p=>({name:p.id,ava:p.ava,pts:calcPoints(p.id),picks:Object.keys(state.predictions?.[p.id]||{}).length})).sort((a,b)=>b.pts-a.pts||b.picks-a.picks);
  $('leaderRows').innerHTML=rows.map((r,i)=>`<div class="leader-row"><div class="rank">${i===0?'👑':i+1}</div><div><div class="lname">${r.ava} ${r.name}</div><div class="lsub">${r.picks} picks</div></div><div class="pts">${r.pts}</div></div>`).join('');
}

// ── Music + Visualizer ──
const music=$('bgMusic');
const bars=[...document.querySelectorAll('.bar')];
let audioUnlocked=false,audioCtx=null,analyser=null,sourceNode=null,freqData=null,visRAF=null;

function updateMusicUI(){$('playPauseBtn').textContent=music.paused?'▶':'❚❚';$('muteBtn').textContent=music.muted?'🔇':'🔊';$('musicState').textContent=audioUnlocked?(music.paused?'Paused':'Playing'):'Tap to play';}
function paintIdle(){bars.forEach((b,i)=>{b.style.height=`${8+i%3*3}px`;b.classList.add('idle');b.style.filter='none';});}
function ensureGraph(){if(audioCtx)return;audioCtx=new(window.AudioContext||window.webkitAudioContext)();analyser=audioCtx.createAnalyser();analyser.fftSize=64;analyser.smoothingTimeConstant=.82;freqData=new Uint8Array(analyser.frequencyBinCount);sourceNode=audioCtx.createMediaElementSource(music);sourceNode.connect(analyser);analyser.connect(audioCtx.destination);}
function animVis(){if(visRAF)cancelAnimationFrame(visRAF);const tick=()=>{if(!analyser||music.paused||music.muted){paintIdle();visRAF=requestAnimationFrame(tick);return;}analyser.getByteFrequencyData(freqData);bars.forEach((b,i)=>{const idx=Math.min(freqData.length-1,Math.floor((i+1)*freqData.length/(bars.length+1)));const v=freqData[idx]||0;const h=8+(v/255)*28;const isPink=(i+Math.round(performance.now()/300))%2===0;const c1=isPink?'#ff9de1':'#b8ffd0';const c2=isPink?'#ff4fc3':'#20b04b';b.classList.remove('idle');b.style.height=`${h}px`;b.style.background=`linear-gradient(180deg,${c1},${c2})`;b.style.filter=`drop-shadow(0 0 ${4+v/28}px ${c2})`;});visRAF=requestAnimationFrame(tick);};tick();}
async function tryPlay(){if(!music.currentSrc)return;try{ensureGraph();if(audioCtx.state==='suspended')await audioCtx.resume();await music.play();animVis();updateMusicUI();}catch(e){updateMusicUI();}}
async function unlockAndAutoplayMusic(){audioUnlocked=true;localStorage.setItem('pb_unlocked','1');await tryPlay();}
function initMusic(){music.volume=.42;if(localStorage.getItem('pb_unlocked')==='1'){audioUnlocked=true;tryPlay();}paintIdle();const once=()=>{if(!audioUnlocked)unlockAndAutoplayMusic();document.removeEventListener('click',once);document.removeEventListener('touchstart',once);};document.addEventListener('click',once,{passive:true});document.addEventListener('touchstart',once,{passive:true});$('playPauseBtn').onclick=async()=>{audioUnlocked=true;localStorage.setItem('pb_unlocked','1');if(music.paused)await tryPlay();else{music.pause();paintIdle();}updateMusicUI();};$('muteBtn').onclick=()=>{music.muted=!music.muted;updateMusicUI();if(music.muted)paintIdle();};music.addEventListener('play',()=>{animVis();updateMusicUI();});music.addEventListener('pause',()=>{paintIdle();updateMusicUI();});updateMusicUI();}

$('changeBtn').onclick=()=>{state.player=null;syncPlayerUI();renderMatches();showToast('Choose player again');};
$('boardBtn').onclick=()=>$('boardModal').classList.add('open');
$('closeBoard').onclick=()=>$('boardModal').classList.remove('open');
$('boardModal').onclick=e=>{if(e.target.id==='boardModal')e.currentTarget.classList.remove('open');};

initMusic();
onValue(ref(db,'worldcup/shared'),snap=>{
  const d=snap.val()||{};
  state.fixtures=d.fixtures||{};state.results=d.results||{};state.livescores=d.livescores||{};state.predictions=d.predictions||{};
  renderPlayers();renderFilters();syncPlayerUI();renderMatches();updateLeaderboard();
});
</script>
</body>
</html>
