<!DOCTYPE html>
<html lang="fa" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Pishbini Bazi Ha</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#070a1a;
      --text:#f7f7f5;
      --muted:rgba(247,247,245,.66);
      --green:#4ade80;
      --red:#ff5f77;
      --blur:blur(22px) saturate(180%);
      --font:'Inter',system-ui,sans-serif;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html{-webkit-font-smoothing:antialiased;scroll-behavior:smooth}
    body{
      min-height:100vh;
      font-family:var(--font);
      color:var(--text);
      background: linear-gradient(135deg, #5b2bbd 0%, #3c458f 32%, #147b8a 72%, #0aaeb3 100%);
      background-attachment: fixed;
    }
    button,input{font:inherit;color:inherit;border:none;background:none;outline:none}
    button{cursor:pointer}
    .wrap{max-width:1040px;margin:0 auto;padding:0 18px;position:relative;z-index:1}
    
    .topbar{
      position:sticky;top:0;z-index:60;
      padding:14px 0;
      backdrop-filter:var(--blur);
      background:rgba(8,11,27,.2);
      border-bottom:1px solid rgba(255,255,255,.10);
    }
    .topbar-in{display:flex;align-items:center;justify-content:space-between;}
    .brand{font-weight:800;letter-spacing:-.03em;}
    .ghost{padding:8px 16px;border-radius:999px;background:rgba(255,255,255,.15);font-weight:700;font-size:.85rem;backdrop-filter:var(--blur);}

    .hero{padding:40px 0 20px;}
    .hero h1{font-size:clamp(2.5rem, 5vw, 4.5rem);font-weight:900;line-height:.9;letter-spacing:-.06em;}
    .players{margin-top:30px;display:flex;gap:10px;flex-wrap:wrap;}
    .player{padding:12px 20px;border-radius:18px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);font-weight:800;backdrop-filter:var(--blur);transition:.2s;}
    .player.active{background:rgba(255,255,255,.25);border-color:#fff;transform:translateY(-2px);}
    
    .filters{margin-top:30px;display:flex;gap:8px;padding-bottom:15px;}
    .filter{padding:10px 18px;border-radius:999px;background:rgba(255,255,255,.1);font-weight:700;font-size:.85rem;}
    .filter.active{background:#fff;color:#000;}

    .list{display:grid;gap:20px;padding-bottom:60px;}
    
    /* MATCH CARD - MATCHING YOUR IMAGE */
    .match{
      background:linear-gradient(135deg, rgba(62,69,114,.6), rgba(39,52,78,.6));
      border-radius:24px;
      padding:24px;
      box-shadow:0 15px 40px rgba(0,0,0,.2);
      backdrop-filter:var(--blur);
      border:1px solid rgba(255,255,255,.1);
    }
    .match.live{box-shadow:0 0 0 1px rgba(74,222,128,.3), 0 15px 40px rgba(0,0,0,.2);}
    
    .meta{display:flex;justify-content:space-between;font-size:.7rem;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,.6);margin-bottom:20px;}
    
    .score-area{display:flex;align-items:center;justify-content:space-between;}
    .team-col{display:flex;flex-direction:column;align-items:center;width:30%;}
    .flag-img{width:64px;height:64px;border-radius:50%;object-fit:cover;margin-bottom:12px;box-shadow:0 4px 12px rgba(0,0,0,.2);}
    .team-name{font-size:1.1rem;font-weight:600;}
    
    .center-col{display:flex;flex-direction:column;align-items:center;width:40%;}
    .score-row{display:flex;align-items:center;gap:20px;font-size:3.5rem;font-weight:600;font-variant-numeric:tabular-nums;line-height:1;}
    .vs-cup{font-size:2rem;opacity:0.8;}
    
    .time-status{margin-top:15px;font-size:1.2rem;font-weight:700;color:var(--green);}
    .time-status.upcoming{color:rgba(255,255,255,.8);font-size:1rem;}
    
    /* PREDICT AREA */
    .predict{margin-top:20px;padding-top:20px;border-top:1px solid rgba(255,255,255,.1);}
    .entry{display:flex;align-items:center;justify-content:space-between;gap:15px;background:rgba(0,0,0,.15);padding:15px;border-radius:18px;}
    .inputs{display:flex;align-items:center;gap:12px;}
    .box{width:60px;height:50px;border-radius:12px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);text-align:center;font-size:1.3rem;font-weight:800;color:#fff;}
    .box:focus{background:rgba(255,255,255,.2);border-color:#fff;}
    .box:disabled{opacity:0.5;}
    .dash{font-weight:900;color:rgba(255,255,255,.5);}
    .save{padding:14px 24px;border-radius:12px;background:rgba(255,255,255,.2);font-weight:800;transition:.2s;}
    .save:hover:not(:disabled){background:#fff;color:#000;}
    .save.locked{background:rgba(255,95,119,.15);color:#ffc4cc;}
    
    .all-preds{margin-top:15px;display:flex;gap:8px;flex-wrap:wrap;}
    .pred-tag{padding:6px 12px;border-radius:999px;background:rgba(255,255,255,.1);font-size:.8rem;font-weight:700;color:var(--muted);}
    .pred-tag.good{color:#4ade80;background:rgba(74,222,128,.15);}

    /* MODAL & TOAST */
    .modal-wrap{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;z-index:90;}
    .modal-wrap.open{display:flex;}
    .modal{width:min(480px,90%);background:rgba(30,35,55,.9);padding:24px;border-radius:24px;border:1px solid rgba(255,255,255,.1);}
    .leader-row{display:flex;align-items:center;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.05);}
    .pts{margin-left:auto;font-size:1.5rem;font-weight:900;}
    .toast{position:fixed;bottom:30px;left:50%;transform:translate(-50%,100px);background:#fff;color:#000;padding:12px 24px;border-radius:999px;font-weight:800;transition:.3s;z-index:100;opacity:0;}
    .toast.show{transform:translate(-50%,0);opacity:1;}
    
    @media(max-width:600px){
      .score-row{font-size:2.8rem;gap:15px;}
      .flag-img{width:48px;height:48px;}
      .entry{flex-direction:column;align-items:stretch;}
      .save{text-align:center;}
      .inputs{justify-content:center;}
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="wrap topbar-in">
      <div class="brand">Pishbini Bazi Ha</div>
      <button class="ghost" id="boardBtn">🏆 Leaderboard</button>
    </div>
  </header>

  <main class="wrap">
    <section class="hero">
      <h1>Pishbini<br>Bazi Ha</h1>
      
      <div class="players">
        <button class="player active" data-player="HANBA">HANBA</button>
        <button class="player" data-player="YASIN BAMBA">YASIN BAMBA</button>
        <button class="player" data-player="AMA BAMBA">AMA BAMBA</button>
        <button class="player" data-player="KAMBAB">KAMBAB</button>
      </div>

      <div class="filters">
        <button class="filter active" data-view="upcoming">Upcoming</button>
        <button class="filter" data-view="live">🔴 Live</button>
        <button class="filter" data-view="finished">Finished</button>
        <button class="filter" data-view="all">All</button>
      </div>
    </section>

    <section class="list" id="matchList"></section>
  </main>

  <div class="modal-wrap" id="boardModal">
    <div class="modal">
      <div style="display:flex;justify-content:space-between;margin-bottom:20px;">
        <h2>Leaderboard</h2>
        <button class="ghost" id="closeBoard">Close</button>
      </div>
      <div id="leaderRows"></div>
    </div>
  </div>
  <div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getDatabase, ref, set, onValue } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js';

const app = initializeApp({
  databaseURL:'https://pishbini-bazi-ha-default-rtdb.firebaseio.com',
  projectId:'pishbini-bazi-ha'
});
const db = getDatabase(app);

const PLAYERS = ['HANBA','YASIN BAMBA','AMA BAMBA','KAMBAB'];
const state = { player:'HANBA', view:'upcoming', fixtures:{}, results:{}, livescores:{}, predictions:{} };
const $ = id => document.getElementById(id);

// --- TEHRAN TIME LOGIC ---
function getIranStrings(match) {
  if(!match.local_date) return { time:'00:00', date:'--/--' };
  // Using direct formatting to Iran Time
  const d = new Date(match.local_date.replace(' ', 'T') + 'Z'); 
  const time = new Intl.DateTimeFormat('en-GB', {timeZone:'Asia/Tehran', hour:'2-digit', minute:'2-digit'}).format(d);
  const date = new Intl.DateTimeFormat('en-GB', {timeZone:'Asia/Tehran', month:'short', day:'numeric'}).format(d);
  return { time, date };
}

function startTs(match) { return new Date(match.local_date.replace(' ', 'T') + 'Z').getTime(); }
function hasStarted(match) { return Date.now() >= startTs(match); }
function isFinished(match) { return String(match.finished||'').toUpperCase() === 'TRUE'; }
function isLive(match) { return !isFinished(match) && !!state.livescores[match.id]; }

// Flag generation (using emoji for now to match UI shape quickly)
function getFlag(name) {
  const flags = {'Sweden':'🇸🇪','Tunisia':'🇹🇳','Spain':'🇪🇸','Cape Verde':'🇨🇻','Brazil':'🇧🇷'};
  return flags[name] || '🏳️';
}

function renderAll() {
  document.querySelectorAll('.player').forEach(b => {
    b.classList.toggle('active', b.dataset.player === state.player);
    b.onclick = () => { state.player = b.dataset.player; renderAll(); };
  });
  
  document.querySelectorAll('.filter').forEach(b => {
    b.classList.toggle('active', b.dataset.view === state.view);
    b.onclick = () => { state.view = b.dataset.view; renderAll(); };
  });

  const all = Object.values(state.fixtures).filter(m=>m&&m.home_name);
  let visible = all;
  if(state.view==='upcoming') visible = all.filter(m=>!isFinished(m) && !hasStarted(m));
  if(state.view==='live') visible = all.filter(m=>isLive(m));
  if(state.view==='finished') visible = all.filter(m=>isFinished(m));
  visible.sort((a,b)=>startTs(a)-startTs(b));

  $('matchList').innerHTML = visible.map(m => {
    const id = m.id;
    const live = isLive(m), fin = isFinished(m), started = hasStarted(m);
    const ls = state.livescores[id], res = state.results[id], myPred = state.predictions[state.player]?.[id];
    const tz = getIranStrings(m);
    
    let g1='0', g2='0', statusUI='';
    if(fin && res) {
      g1=res.g1; g2=res.g2; statusUI=`<div class="time-status upcoming">FT</div>`;
    } else if(live && ls) {
      g1=ls.g1; g2=ls.g2; statusUI=`<div class="time-status">${ls.minute||'LIVE'}</div>`;
    } else {
      statusUI=`<div class="time-status upcoming">${tz.time}</div>`;
    }

    const preds = PLAYERS.map(p => {
      const pr = state.predictions[p]?.[id];
      return pr ? `<span class="pred-tag">${p.split(' ')[0]}: ${pr.g1}-${pr.g2}</span>` : '';
    }).join('');

    return `
      <div class="match ${live?'live':''}">
        <div class="meta"><span>Group ${m.group||'-'}</span><span>${tz.date} (IRAN)</span></div>
        <div class="score-area">
          <div class="team-col">
            <div style="font-size:3.5rem;line-height:1;margin-bottom:10px">${getFlag(m.home_name)}</div>
            <div class="team-name">${m.home_name}</div>
          </div>
          <div class="center-col">
            <div class="score-row"><span>${g1}</span><span class="vs-cup">🏆</span><span>${g2}</span></div>
            ${statusUI}
          </div>
          <div class="team-col">
            <div style="font-size:3.5rem;line-height:1;margin-bottom:10px">${getFlag(m.away_name)}</div>
            <div class="team-name">${m.away_name}</div>
          </div>
        </div>
        
        <div class="predict">
          <div class="entry">
            <div class="inputs">
              <input id="g1-${id}" class="box" type="number" value="${myPred?.g1||''}" ${started?'disabled':''}>
              <span class="dash">-</span>
              <input id="g2-${id}" class="box" type="number" value="${myPred?.g2||''}" ${started?'disabled':''}>
            </div>
            <button class="save ${started?'locked':''}" data-id="${id}" ${started?'disabled':''}>
              ${started ? '🔒 Locked' : 'Save Pick'}
            </button>
          </div>
          <div class="all-preds">${preds}</div>
        </div>
      </div>
    `;
  }).join('');
  
  document.querySelectorAll('.save:not(:disabled)').forEach(b => {
    b.onclick = async () => {
      const id = b.dataset.id;
      const v1 = $(`g1-${id}`).value, v2 = $(`g2-${id}`).value;
      if(!v1 || !v2) return showToast('Fill both inputs!');
      await set(ref(db, `worldcup/shared/predictions/${state.player}/${id}`), {g1:+v1, g2:+v2});
      showToast('Saved ✓');
    };
  });
}

function showToast(m) {
  const t = $('toast'); t.textContent = m; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2000);
}

onValue(ref(db, 'worldcup/shared'), s => {
  const d = s.val()||{};
  state.fixtures = d.fixtures||{}; state.results = d.results||{};
  state.livescores = d.livescores||{}; state.predictions = d.predictions||{};
  renderAll();
});

$('boardBtn').onclick=()=>$('boardModal').classList.add('open');
$('closeBoard').onclick=()=>$('boardModal').classList.remove('open');
</script>
</body>
</html>
