<!DOCTYPE html>
<html lang="fa" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover" />
  <title>Pishbini Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#050505;
      --bg2:#0b0b0b;
      --card:#101010;
      --card2:#151515;
      --line:rgba(255,255,255,.08);
      --line2:rgba(255,255,255,.14);
      --text:#f5f5f5;
      --muted:rgba(245,245,245,.56);
      --green:#7dff9c;
      --purple:#d6c3ff;
      --pink:#ff4fc3;
      --pink2:#ff9de1;
      --radius-xl:28px;
      --radius-lg:22px;
      --radius-md:16px;
      --font:'Inter',system-ui,sans-serif;
      --shadow:0 18px 40px rgba(0,0,0,.28);
    }

    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
    html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased;background:var(--bg);overscroll-behavior-y:none}
    body{
      margin:0;
      min-height:100vh;
      font-family:var(--font);
      color:var(--text);
      background:linear-gradient(180deg,var(--bg) 0%, var(--bg2) 100%);
      padding:0 0 calc(24px + env(safe-area-inset-bottom));
      overflow-x:hidden;
    }
    button,input{font:inherit;color:inherit;border:none;background:none;outline:none}
    button{cursor:pointer}
    .wrap{max-width:860px;margin:0 auto;padding:0 14px}

    .topbar{position:sticky;top:0;z-index:60;background:rgba(5,5,5,.94);border-bottom:1px solid rgba(255,255,255,.05)}
    .topbar-inner{display:flex;justify-content:space-between;align-items:center;min-height:62px;padding:10px 0;gap:10px}
    .selected-top{
      display:flex;align-items:center;gap:10px;min-width:0;flex:1;
    }
    .selected-label{font-size:.72rem;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
    .selected-name{font-size:1rem;font-weight:900;letter-spacing:-.03em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .change-btn,.leader-btn{
      min-height:42px;padding:0 16px;border-radius:999px;background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);font-weight:800;font-size:.85rem;flex:0 0 auto;
    }
    .change-btn:active,.leader-btn:active{transform:scale(.97)}
    .change-btn.hidden,.selected-top.hidden{display:none}

    .controls{padding:16px 0 12px;display:grid;gap:12px}
    .player-shell{
      background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.03));
      border:1px solid rgba(255,255,255,.07);border-radius:24px;padding:16px;box-shadow:var(--shadow);
      display:grid;gap:14px;
    }
    .player-shell.hidden{display:none}
    .pink-title-wrap{text-align:center;padding-top:4px}
    .pink-title{
      display:inline-block;
      font-size:clamp(1.35rem,5vw,2.15rem);
      font-weight:900;letter-spacing:-.04em;line-height:1;
      color:#ffd7f3;
      text-shadow:
        0 1px 0 #ffb5e5,
        0 2px 0 #ff8fd8,
        0 3px 0 #ff71cf,
        0 4px 0 #ff57c7,
        0 10px 18px rgba(255,79,195,.36),
        0 0 22px rgba(255,79,195,.22);
      transform:perspective(600px) rotateX(14deg);
    }
    .pink-sub{font-size:.8rem;color:var(--muted);margin-top:8px;font-weight:700}

    .player-tabs{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
    .p-tab{
      min-height:52px;border-radius:18px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.07);
      color:var(--text);font-size:.86rem;font-weight:900;letter-spacing:-.02em;
      display:flex;align-items:center;justify-content:center;gap:8px;transition:background .18s ease,border-color .18s ease,transform .12s ease;
    }
    .p-tab:active{transform:scale(.98);background:rgba(255,255,255,.09)}
    .p-ava{font-size:1rem}

    .filters{display:flex;gap:8px;overflow:auto hidden;scrollbar-width:none;padding-bottom:2px}
    .filters::-webkit-scrollbar{display:none}
    .filter{
      min-height:40px;padding:0 15px;white-space:nowrap;border-radius:999px;
      background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);
      color:var(--muted);font-size:.82rem;font-weight:800;flex:0 0 auto;
      transition:background .18s ease,color .18s ease,border-color .18s ease;
    }
    .filter.active{background:#fff;color:#000;border-color:#fff}

    .list{display:grid;gap:14px}
    .match{background:linear-gradient(180deg,var(--card),var(--card2));border:1px solid var(--line);border-radius:var(--radius-xl);padding:16px;box-shadow:var(--shadow)}
    .match.live{border-color:rgba(125,255,156,.22)}
    .meta{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:14px;font-size:.68rem;font-weight:900;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
    .state-pill{min-height:28px;padding:0 10px;border-radius:999px;display:inline-flex;align-items:center;gap:7px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.07);letter-spacing:.08em}
    .state-pill.live{color:var(--green);border-color:rgba(125,255,156,.18);background:rgba(125,255,156,.08)}
    .state-pill.finished{color:var(--purple)}
    .dot{width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block}

    .board{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px}
    .team{text-align:center;min-width:0}
    .flag{font-size:44px;line-height:1;margin-bottom:10px}
    .name{font-size:.98rem;font-weight:850;letter-spacing:-.03em;line-height:1.2;word-break:break-word}
    .center{text-align:center;min-width:108px}
    .score{display:flex;align-items:center;justify-content:center;gap:12px;font-size:3.2rem;font-weight:900;line-height:1;letter-spacing:-.08em;font-variant-numeric:tabular-nums}
    .cup{font-size:1.55rem;opacity:.95}
    .status{margin-top:10px;min-height:32px;padding:0 12px;border-radius:999px;display:inline-flex;align-items:center;justify-content:center;gap:8px;background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.06);color:var(--muted);font-size:.8rem;font-weight:900}
    .status.live{background:rgba(125,255,156,.08);border-color:rgba(125,255,156,.18);color:var(--green)}
    .status.finished{color:var(--purple)}

    .action{margin-top:16px;background:#090909;border:1px solid rgba(255,255,255,.05);border-radius:22px;padding:10px;display:grid;gap:10px}
    .pick-row{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px}
    .step-group{min-height:48px;border-radius:999px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.07);display:grid;grid-template-columns:44px 1fr 44px;align-items:center;overflow:hidden}
    .s-btn{width:44px;height:44px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.35rem;font-weight:800}
    .s-btn:active{background:rgba(255,255,255,.08)}
    .s-btn:disabled{opacity:.3;pointer-events:none}
    .s-val{width:100%;text-align:center;background:transparent;color:#fff;font-size:1.35rem;font-weight:900;border:none}
    .mid-divider{color:rgba(255,255,255,.22);font-weight:900;font-size:1.2rem}
    .save{min-height:50px;border-radius:999px;background:#fff;color:#000;font-size:.92rem;font-weight:900;width:100%;transition:transform .12s ease,opacity .18s ease,background .18s ease}
    .save:active:not(:disabled){transform:scale(.985)}
    .save:disabled,.save.locked{background:rgba(255,255,255,.08);color:var(--muted)}

    .chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
    .chip{min-height:30px;padding:0 11px;border-radius:999px;display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.06);color:var(--muted);font-size:.75rem;font-weight:800}
    .chip.good{background:rgba(125,255,156,.10);color:var(--green);border-color:rgba(125,255,156,.16)}
    .chip.exact{background:#fff;color:#000;border-color:#fff}

    .empty{text-align:center;padding:56px 18px;border-radius:24px;background:rgba(255,255,255,.03);border:1px dashed rgba(255,255,255,.10);color:var(--muted);font-weight:800}

    .modal-overlay{position:fixed;inset:0;z-index:100;display:none;align-items:flex-end;justify-content:center;background:rgba(0,0,0,.72)}
    .modal-overlay.open{display:flex}
    .modal{width:min(520px,100%);max-height:82vh;overflow:auto;border-radius:28px 28px 0 0;background:linear-gradient(180deg,#111,#0a0a0a);border-top:1px solid rgba(255,255,255,.08);padding:18px 18px calc(18px + env(safe-area-inset-bottom))}
    .m-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:10px}
    .m-title{font-size:1.15rem;font-weight:900}
    .close-btn{min-height:40px;padding:0 14px;border-radius:999px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);font-weight:800}
    .leader-row{display:grid;grid-template-columns:36px 1fr auto;gap:10px;align-items:center;padding:14px 0;border-top:1px solid rgba(255,255,255,.06)}
    .leader-row:first-child{border-top:none}
    .rank{font-size:1.15rem;text-align:center}
    .lname{font-size:.96rem;font-weight:900}
    .lsub{font-size:.75rem;color:var(--muted);margin-top:2px}
    .pts{font-size:1.7rem;font-weight:900;letter-spacing:-.06em}

    .toast{position:fixed;left:50%;top:18px;z-index:120;transform:translate(-50%,-110px);padding:13px 18px;border-radius:999px;background:#fff;color:#000;font-size:.84rem;font-weight:900;box-shadow:0 16px 34px rgba(0,0,0,.4);transition:transform .22s ease;max-width:calc(100vw - 26px);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .toast.show{transform:translate(-50%,0)}

    @media (min-width:700px){
      .wrap{padding:0 20px}
      .player-tabs{grid-template-columns:repeat(4,1fr)}
      .pick-row{grid-template-columns:1fr auto 1fr auto}
      .save{width:auto;min-width:148px}
      .action{grid-template-columns:1fr auto;align-items:center}
      .flag{font-size:52px}
      .score{font-size:3.8rem}
      .modal-overlay{align-items:center}
      .modal{border-radius:30px;max-height:80vh;padding:22px}
    }

    @media (prefers-reduced-motion: reduce){
      *,*::before,*::after{animation:none!important;transition:none!important;scroll-behavior:auto!important}
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="wrap topbar-inner">
      <div class="selected-top hidden" id="selectedTop">
        <div>
          <div class="selected-label">Selected</div>
          <div class="selected-name" id="selectedName">-</div>
        </div>
      </div>
      <button class="change-btn hidden" id="changePlayerBtn">Change</button>
      <button class="leader-btn" id="boardBtn">Leaderboard</button>
    </div>
  </header>

  <main class="wrap">
    <section class="controls">
      <div class="player-shell" id="playerShell">
        <div class="pink-title-wrap">
          <div class="pink-title">Rooye esmet Bezan</div>
          <div class="pink-sub">Player ro entekhab kon ta prediction shoro beshe</div>
        </div>
        <div class="player-tabs" id="playerTabs"></div>
      </div>

      <div class="filters">
        <button class="filter active" data-view="upcoming">Upcoming</button>
        <button class="filter" data-view="live">Live</button>
        <button class="filter" data-view="finished">Finished</button>
        <button class="filter" data-view="all">All</button>
      </div>
    </section>

    <section class="list" id="matchList"></section>
  </main>

  <div class="modal-overlay" id="boardModal">
    <div class="modal">
      <div class="m-head">
        <div class="m-title">Standings</div>
        <button class="close-btn" id="closeBoard">Close</button>
      </div>
      <div id="leaderRows"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getDatabase, ref, set, onValue } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js';

const app = initializeApp({
  apiKey:'AIzaSyB3T6VN31aw7bezi7wJh9kBSdTuOdAfHGo',
  authDomain:'pishbini-bazi-ha.firebaseapp.com',
  databaseURL:'https://pishbini-bazi-ha-default-rtdb.firebaseio.com',
  projectId:'pishbini-bazi-ha',
  storageBucket:'pishbini-bazi-ha.firebasestorage.app',
  messagingSenderId:'195538591321',
  appId:'1:195538591321:web:63a099506ee9a1b3a49b48'
});
const db = getDatabase(app);

const PLAYERS = [
  {id:'HANBA',ava:'✦'},
  {id:'YASIN BAMBA',ava:'◈'},
  {id:'AMA BAMBA',ava:'◆'},
  {id:'KAMBAB',ava:'✳'}
];

const FLAGS = {'Argentina':'🇦🇷','Australia':'🇦🇺','Belgium':'🇧🇪','Bolivia':'🇧🇴','Bosnia and Herzegovina':'🇧🇦','Brazil':'🇧🇷','Canada':'🇨🇦','Cameroon':'🇨🇲','Cape Verde':'🇨🇻','Chile':'🇨🇱','Colombia':'🇨🇴','Costa Rica':'🇨🇷','Croatia':'🇭🇷','Czech Republic':'🇨🇿','Denmark':'🇩🇰','Ecuador':'🇪🇨','Egypt':'🇪🇬','England':'🏴','France':'🇫🇷','Germany':'🇩🇪','Ghana':'🇬🇭','Guatemala':'🇬🇹','Honduras':'🇭🇳','Iceland':'🇮🇸','Iran':'🇮🇷','Jamaica':'🇯🇲','Japan':'🇯🇵','Mali':'🇲🇱','Mexico':'🇲🇽','Morocco':'🇲🇦','Netherlands':'🇳🇱','New Zealand':'🇳🇿','Nigeria':'🇳🇬','Norway':'🇳🇴','Panama':'🇵🇦','Paraguay':'🇵🇾','Peru':'🇵🇪','Poland':'🇵🇱','Portugal':'🇵🇹','Qatar':'🇶🇦','Saudi Arabia':'🇸🇦','Scotland':'🏴','Senegal':'🇸🇳','Serbia':'🇷🇸','South Africa':'🇿🇦','South Korea':'🇰🇷','Spain':'🇪🇸','Sweden':'🇸🇪','Switzerland':'🇨🇭','Tunisia':'🇹🇳','Turkey':'🇹🇷','Ukraine':'🇺🇦','United States':'🇺🇸','USA':'🇺🇸','Uruguay':'🇺🇾','Uzbekistan':'🇺🇿','Venezuela':'🇻🇪','Wales':'🏴'};

const state = {player:null,view:'upcoming',fixtures:{},results:{},livescores:{},predictions:{}};
const $ = id => document.getElementById(id);

window.stepVal = (id, delta) => {
  const el = $(id);
  if(!el || el.disabled) return;
  let v = parseInt(el.value || 0, 10) + delta;
  if(v < 0) v = 0;
  if(v > 20) v = 20;
  el.value = v;
  if(navigator.vibrate) navigator.vibrate(10);
};

function parseRawDate(raw){
  if(!raw) return null;
  const s = String(raw).trim();
  if(!s) return null;
  const [datePart, timePart='00:00'] = s.split(' ');
  let y,m,d;
  if(datePart.includes('/')){
    const p = datePart.split('/').map(Number);
    if(p.length !== 3 || p.some(Number.isNaN)) return null;
    if(String(p[0]).length === 4) [y,m,d] = p; else [m,d,y] = p;
  }else if(datePart.includes('-')){
    const p = datePart.split('-').map(Number);
    if(p.length !== 3 || p.some(Number.isNaN)) return null;
    [y,m,d] = p;
  }else return null;
  const [hh='00', mm='00'] = timePart.split(':');
  const dt = new Date(Date.UTC(y, m - 1, d, Number(hh), Number(mm), 0));
  return isNaN(dt.getTime()) ? null : dt;
}

function startTs(m){ const d = parseRawDate(m.local_date); return d ? d.getTime() : 0; }
function hasStarted(m){ const ts = startTs(m); return ts ? Date.now() >= ts : false; }
function isFinished(m){ return String(m.finished || '').toUpperCase() === 'TRUE'; }
function isLive(m){ return !isFinished(m) && !!state.livescores[String(m.id)]; }
function resultDir(a,b){ return a === b ? 0 : a > b ? 1 : -1; }
function currentShortName(){ return state.player ? state.player.split(' ')[0] : ''; }

function calcPoints(pid){
  let pts = 0;
  Object.entries(state.results || {}).forEach(([id, r]) => {
    const p = state.predictions?.[pid]?.[id];
    if(!p) return;
    if(+p.g1 === +r.g1 && +p.g2 === +r.g2) pts += 3;
    else if(resultDir(+p.g1,+p.g2) === resultDir(+r.g1,+r.g2)) pts += 1;
  });
  return pts;
}

function showToast(msg){
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(window.__toastTimer);
  window.__toastTimer = setTimeout(() => t.classList.remove('show'), 1800);
}

function syncPlayerUI(){
  const selected = !!state.player;
  $('playerShell').classList.toggle('hidden', selected);
  $('selectedTop').classList.toggle('hidden', !selected);
  $('changePlayerBtn').classList.toggle('hidden', !selected);
  $('selectedName').textContent = state.player || '-';
}

function renderPlayers(){
  $('playerTabs').innerHTML = PLAYERS.map(p => `
    <button class="p-tab" data-player="${p.id}">
      <span class="p-ava">${p.ava}</span>${p.id.split(' ')[0]}
    </button>`).join('');
  document.querySelectorAll('.p-tab').forEach(btn => {
    btn.onclick = () => {
      state.player = btn.dataset.player;
      syncPlayerUI();
      renderMatches();
      if(navigator.vibrate) navigator.vibrate([16,20,16]);
      showToast(`${currentShortName()} selected`);
    };
  });
}

function renderFilters(){
  document.querySelectorAll('.filter').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.view === state.view);
    btn.onclick = () => { state.view = btn.dataset.view; renderMatches(); renderFilters(); };
  });
}

function renderMatches(){
  const all = Object.values(state.fixtures || {}).filter(m => m && m.home_name && m.away_name);
  let visible = all;
  if(state.view === 'upcoming') visible = all.filter(m => !isFinished(m) && !hasStarted(m));
  if(state.view === 'live') visible = all.filter(m => isLive(m));
  if(state.view === 'finished') visible = all.filter(m => isFinished(m));
  visible.sort((a,b) => startTs(a) - startTs(b));

  const root = $('matchList');
  if(!visible.length){
    root.innerHTML = '<div class="empty">No matches found.</div>';
    return;
  }

  root.innerHTML = visible.map(m => {
    const id = String(m.id);
    const live = isLive(m), fin = isFinished(m), started = hasStarted(m);
    const ls = state.livescores?.[id];
    const res = state.results?.[id];
    const myPred = state.player ? state.predictions?.[state.player]?.[id] : null;
    let g1='0', g2='0', status='', pill='';

    if(fin && res){
      g1 = res.g1; g2 = res.g2;
      status = '<div class="status finished">FT</div>';
      pill = '<span class="state-pill finished">Locked</span>';
    } else if(live && ls){
      g1 = ls.g1; g2 = ls.g2;
      status = `<div class="status live"><span class="dot"></span>${ls.minute || 'LIVE'}</div>`;
      pill = '<span class="state-pill live"><span class="dot"></span>Live</span>';
    } else {
      status = '<div class="status">Upcoming</div>';
      pill = `<span class="state-pill">${started ? 'Locked' : 'Open'}</span>`;
    }

    const cannotSave = started || !state.player;
    const saveText = !state.player ? 'Choose Player' : (started ? 'Locked' : 'Save Pick');

    const preds = PLAYERS.map(p => {
      const pr = state.predictions?.[p.id]?.[id];
      if(!pr) return '';
      let cls = 'chip';
      if(fin && res){
        if(+pr.g1 === +res.g1 && +pr.g2 === +res.g2) cls += ' exact';
        else if(resultDir(+pr.g1,+pr.g2) === resultDir(+res.g1,+res.g2)) cls += ' good';
      }
      return `<div class="${cls}">${p.ava} ${pr.g1}-${pr.g2}</div>`;
    }).join('');

    return `
      <article class="match ${live?'live':''}">
        <div class="meta"><span>Group ${m.group || '-'}</span>${pill}</div>
        <div class="board">
          <div class="team"><div class="flag">${FLAGS[m.home_name] || '🏳️'}</div><div class="name">${m.home_name}</div></div>
          <div class="center"><div class="score"><span>${g1}</span><span class="cup">🏆</span><span>${g2}</span></div>${status}</div>
          <div class="team"><div class="flag">${FLAGS[m.away_name] || '🏳️'}</div><div class="name">${m.away_name}</div></div>
        </div>
        <div class="action">
          <div class="pick-row">
            <div class="step-group">
              <button class="s-btn" onclick="window.stepVal('g1-${id}',-1)" ${cannotSave?'disabled':''}>−</button>
              <input id="g1-${id}" class="s-val" type="number" value="${myPred?.g1 ?? 0}" readonly ${cannotSave?'disabled':''}>
              <button class="s-btn" onclick="window.stepVal('g1-${id}',1)" ${cannotSave?'disabled':''}>+</button>
            </div>
            <div class="mid-divider">:</div>
            <div class="step-group">
              <button class="s-btn" onclick="window.stepVal('g2-${id}',-1)" ${cannotSave?'disabled':''}>−</button>
              <input id="g2-${id}" class="s-val" type="number" value="${myPred?.g2 ?? 0}" readonly ${cannotSave?'disabled':''}>
              <button class="s-btn" onclick="window.stepVal('g2-${id}',1)" ${cannotSave?'disabled':''}>+</button>
            </div>
            <button class="save ${cannotSave?'locked':''}" data-id="${id}" ${cannotSave?'disabled':''}>${saveText}</button>
          </div>
        </div>
        ${preds ? `<div class="chips">${preds}</div>` : ''}
      </article>`;
  }).join('');

  root.querySelectorAll('.save:not(:disabled)').forEach(btn => {
    btn.onclick = async () => {
      const id = btn.dataset.id;
      const v1 = $(`g1-${id}`).value;
      const v2 = $(`g2-${id}`).value;
      btn.textContent = 'Saving...';
      await set(ref(db, `worldcup/shared/predictions/${state.player}/${id}`), { g1:+v1, g2:+v2, ts:Date.now() });
      btn.textContent = 'Saved ✓';
      setTimeout(() => btn.textContent = 'Save Pick', 1400);
      if(navigator.vibrate) navigator.vibrate([18,24,18]);
      showToast(`${currentShortName()}: ${v1}-${v2}`);
    };
  });
}

function updateLeaderboard(){
  const rows = PLAYERS.map(p => ({
    name:p.id, ava:p.ava, pts:calcPoints(p.id), picks:Object.keys(state.predictions?.[p.id] || {}).length
  })).sort((a,b) => b.pts - a.pts || b.picks - a.picks);

  $('leaderRows').innerHTML = rows.map((r,i) => `
    <div class="leader-row">
      <div class="rank">${i===0?'👑':i+1}</div>
      <div><div class="lname">${r.ava} ${r.name}</div><div class="lsub">${r.picks} picks</div></div>
      <div class="pts">${r.pts}</div>
    </div>`).join('');
}

function renderAll(){
  renderPlayers();
  renderFilters();
  syncPlayerUI();
  renderMatches();
  updateLeaderboard();
}

$('changePlayerBtn').onclick = () => {
  state.player = null;
  syncPlayerUI();
  renderMatches();
  showToast('Choose player again');
};
$('boardBtn').onclick = () => $('boardModal').classList.add('open');
$('closeBoard').onclick = () => $('boardModal').classList.remove('open');
$('boardModal').onclick = e => { if(e.target.id === 'boardModal') e.currentTarget.classList.remove('open'); };

onValue(ref(db, 'worldcup/shared'), snap => {
  const d = snap.val() || {};
  state.fixtures = d.fixtures || {};
  state.results = d.results || {};
  state.livescores = d.livescores || {};
  state.predictions = d.predictions || {};
  renderAll();
});
</script>
</body>
</html>
