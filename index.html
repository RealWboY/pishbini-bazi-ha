<!DOCTYPE html>
<html lang="fa" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover" />
  <title>Pishbini Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#050505;
      --card:#0f0f10;
      --border:#232428;
      --border-light:#17181b;
      --text:#ffffff;
      --text-muted:rgba(255,255,255,.58);
      --accent:#ffffff;
      --green:#10b981;
      --green-bg:rgba(16,185,129,.14);
      --red:#ef4444;
      --red-bg:rgba(239,68,68,.14);
      --pill:#17181b;
      --pill-hover:#232428;
      --font:'Inter',system-ui,sans-serif;
      --radius:16px;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation;margin:0;padding:0}
    html{-webkit-font-smoothing:antialiased;background:var(--bg);overscroll-behavior-y:none}
    body{min-height:100vh;font-family:var(--font);color:var(--text);background:var(--bg);padding-bottom:calc(96px + env(safe-area-inset-bottom));overflow-x:hidden}
    button,input{font:inherit;color:inherit;border:none;background:none;outline:none;cursor:pointer}

    /* ── TOPBAR ── */
    .topbar{position:sticky;top:0;z-index:60;background:rgba(8,8,8,.92);border-bottom:1px solid var(--border);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}
    .topbar-inner{max-width:680px;margin:0 auto;padding:0 16px;display:flex;justify-content:space-between;align-items:center;height:60px;gap:10px}
    .tb-left{display:flex;align-items:center;gap:12px;min-width:0;flex:1}
    .tb-logo{font-size:1.2rem;font-weight:900;letter-spacing:-.04em;color:var(--text);display:flex;align-items:center;gap:6px}
    .selected-badge{display:flex;align-items:center;gap:6px;background:var(--pill);border-radius:999px;padding:6px 14px 6px 8px;min-width:0;border:1px solid var(--border-light);color:var(--text)}
    .selected-badge.hidden{display:none}
    .badge-ava{font-size:1rem}
    .badge-name{font-size:.85rem;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:120px}
    .tb-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
    .tb-btn{height:38px;padding:0 16px;border-radius:999px;background:var(--pill);font-size:.85rem;font-weight:800;color:var(--text);display:flex;align-items:center;gap:6px;transition:background .15s;border:1px solid var(--border-light)}
    .tb-btn:active{background:var(--pill-hover)}
    .tb-btn.primary{background:#ffffff;color:#000000}
    .tb-btn.primary:active{background:#d9d9d9}

    /* ── DATE BAR ── */
    .datebar-wrap{background:#0b0b0c;border-bottom:1px solid var(--border)}
    .datebar{max-width:680px;margin:0 auto;padding:0 16px;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;height:52px;align-items:center}
    .datebar::-webkit-scrollbar{display:none}
    .day-btn{height:36px;padding:0 18px;border-radius:999px;font-size:.85rem;font-weight:700;color:var(--text-muted);white-space:nowrap;flex-shrink:0;transition:all .15s;border:1px solid transparent}
    .day-btn.active{background:#ffffff;color:#000000;font-weight:800;border-color:var(--text);box-shadow:0 4px 12px rgba(0,0,0,.15)}

    /* ── PLAYER PICKER ── */
    .picker-wrap{max-width:680px;margin:0 auto;padding:16px 16px 0}
    .picker-card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;box-shadow:0 10px 28px rgba(0,0,0,.24)}
    .picker-card.hidden{display:none}
    .picker-head{padding:16px;border-bottom:1px solid var(--border-light);text-align:center}
    .pink-3d{display:inline-block;font-size:clamp(1.35rem,5vw,2rem);font-weight:900;letter-spacing:-.04em;line-height:1;color:#ffd7f3;text-shadow:0 1px 0 #ffb5e5,0 2px 0 #ff8fd8,0 3px 0 #ff71cf,0 4px 0 #ff57c7,0 8px 16px rgba(255,79,195,.32);transform:perspective(500px) rotateX(12deg)}
    .picker-sub{font-size:.8rem;color:var(--text-muted);margin-top:8px;font-weight:600}
    .picker-grid{display:grid;grid-template-columns:1fr 1fr;background:var(--border-light);gap:1px}
    .p-btn{display:flex;align-items:center;justify-content:center;gap:10px;padding:16px;background:#111214;font-size:.95rem;font-weight:800;transition:background .15s;color:var(--text)}
    .p-btn:active{background:var(--pill)}
    .p-ava{font-size:1.2rem}

    /* ── SECTION ── */
    .section{max-width:680px;margin:16px auto 0;padding:0 16px}
    .section-head{font-size:.75rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);margin-bottom:10px;padding-left:4px}

    /* ── PRO MATCH CARD (FotMob Style) ── */
    .match-card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;margin-bottom:14px;box-shadow:0 10px 28px rgba(0,0,0,.28)}
    .m-header{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:#0b0b0c;border-bottom:1px solid var(--border-light);font-size:.75rem;font-weight:800;color:var(--text-muted)}
    .m-header-left{display:flex;align-items:center;gap:6px}
    .m-icon{font-size:.9rem}

    .m-body{display:flex;align-items:stretch;padding:14px}

    .m-time-col{width:56px;display:flex;flex-direction:column;align-items:center;justify-content:center;border-right:1px solid var(--border-light);padding-right:12px;margin-right:12px;flex-shrink:0}
    .mt-main{font-size:.95rem;font-weight:900;color:var(--text);line-height:1.1}
    .mt-sub{font-size:.7rem;font-weight:700;color:var(--text-muted);margin-top:4px}
    .mt-main.live{color:var(--red);animation:pulse 2s infinite}
    .mt-sub.live{color:var(--red)}

    .m-teams-col{flex:1;display:flex;flex-direction:column;gap:10px;min-width:0}
    .t-row{display:flex;align-items:center;justify-content:space-between}
    .t-left{display:flex;align-items:center;gap:10px;min-width:0}
    .t-flag{font-size:1.3rem;line-height:1;filter:drop-shadow(0 2px 4px rgba(0,0,0,.1))}
    .t-name{font-size:1rem;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .t-name.winner{font-weight:800}
    .t-score{font-size:1.15rem;font-weight:800;color:var(--text)}
    .t-score.empty{color:var(--text-muted);font-weight:600}

    /* Actions / Predictions */
    .m-actions{padding:12px 14px;border-top:1px solid var(--border-light);background:#0b0b0c;display:flex;flex-direction:column;gap:12px;overflow:hidden}

    .pred-row{display:flex;align-items:center;justify-content:space-between;gap:10px}
    .pred-chips{display:flex;flex-wrap:wrap;gap:6px;flex:1}
    .chip{height:28px;padding:0 12px;border-radius:999px;font-size:.75rem;font-weight:800;display:inline-flex;align-items:center;gap:6px;background:var(--pill);color:var(--text-muted);border:1px solid var(--border-light)}
    .chip-name{font-weight:900;text-transform:uppercase;letter-spacing:0.02em}
    .chip.good{background:var(--green-bg);color:var(--green);border-color:#a7f3d0}
    .chip.exact{background:#ffffff;color:#000000;border-color:var(--text)}

    .pred-controls{display:flex;align-items:center;gap:10px;background:#111214;border:1px solid var(--border);border-radius:999px;padding:4px;box-shadow:0 2px 8px rgba(0,0,0,.04);min-width:0}
    .stepper{display:flex;align-items:center;background:var(--pill);border-radius:999px;height:34px;overflow:hidden}
    .st-btn{width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;font-weight:900;color:var(--text-muted);transition:background .1s}
    .st-btn:active{background:#d1d5db;color:#000}
    .st-btn:disabled{opacity:.3;pointer-events:none}
    .st-val{width:24px;text-align:center;font-size:1rem;font-weight:900;color:var(--text);background:none;border:none}
    .st-div{font-size:.8rem;font-weight:900;color:var(--text-muted);margin:0 -2px}

    .save-btn{height:34px;padding:0 16px;border-radius:999px;background:#ffffff;color:#000000;font-size:.85rem;font-weight:800;transition:all .15s;display:inline-flex;align-items:center;justify-content:center;white-space:nowrap}
    .save-btn:disabled{background:var(--pill);color:var(--text-muted)}
    .save-btn.saved{background:var(--green);color:#ffffff}
    .save-btn:active:not(:disabled){transform:scale(.96)}

    .locked-msg{height:34px;padding:0 16px;border-radius:999px;background:var(--pill);color:var(--text-muted);font-size:.8rem;font-weight:800;display:flex;align-items:center;justify-content:center;white-space:nowrap}

    /* ── MUSIC DOCK ── */
    .music-dock{position:fixed;left:50%;bottom:16px;transform:translateX(-50%);z-index:90;width:min(calc(100vw - 32px),560px);padding:10px 14px;border-radius:24px;background:rgba(10,10,10,.94);border:1px solid var(--border);box-shadow:0 12px 36px rgba(0,0,0,.12);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}
    .music-row{display:grid;grid-template-columns:auto auto 1fr auto;align-items:center;gap:12px}
    .music-btn{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--pill);font-size:1rem;font-weight:900;border:1px solid var(--border-light);color:var(--text)}
    .music-meta{min-width:0;overflow:hidden}.music-title{font-size:.85rem;font-weight:900;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}.music-sub{font-size:.7rem;color:var(--text-muted);margin-top:2px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .visualizer{display:flex;align-items:flex-end;justify-content:center;gap:4px;width:90px;height:38px;border-radius:14px;background:var(--pill);padding:0 8px;border:1px solid var(--border-light);overflow:hidden;box-shadow:inset 0 0 0 1px rgba(255,255,255,.02)}
    .bar{width:8px;height:10px;border-radius:999px 999px 3px 3px;transform-origin:bottom center;background:linear-gradient(180deg,#ff9de1,#ff4fc3);transition:height .1s linear,background .16s linear,filter .14s linear}
    .bar.alt{background:linear-gradient(180deg,#b8ffd0,#10b981)}
    .bar.idle{height:8px;opacity:.5}

    /* ── MODAL ── */
    .modal-overlay{position:fixed;inset:0;z-index:100;display:none;align-items:flex-end;justify-content:center;background:rgba(0,0,0,.4);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}.modal-overlay.open{display:flex}
    .modal{width:min(540px,100%);max-height:85vh;overflow:auto;border-radius:28px 28px 0 0;background:#0b0b0c;padding:20px 20px calc(24px + env(safe-area-inset-bottom));box-shadow:0 -10px 40px rgba(0,0,0,.2)}
    .m-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:16px}.m-title{font-size:1.15rem;font-weight:900}
    .close-btn{height:40px;padding:0 16px;border-radius:999px;background:var(--pill);font-size:.85rem;font-weight:800}
    .leader-row{display:grid;grid-template-columns:36px 1fr auto;gap:10px;align-items:center;padding:12px 0;border-top:1px solid var(--border-light)}.leader-row:first-child{border-top:none}.rank{width:32px;height:32px;border-radius:999px;background:#15161a;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.82rem;font-weight:900}.lname{font-size:.92rem;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.lsub{font-size:.72rem;color:var(--text-muted);margin-top:3px;font-weight:600}.pts{font-size:1.25rem;font-weight:900;color:var(--text);letter-spacing:-.03em}.leader-inline{display:grid;grid-template-columns:36px 1fr auto;gap:12px;align-items:center;padding:12px 0;border-top:1px solid var(--border-light)}.leader-inline:first-child{border-top:none}.leader-inline .rank{width:32px;height:32px;border-radius:999px;background:#111214;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.82rem;font-weight:900}.leader-inline .lname{font-size:.92rem}.leader-inline .pts{font-size:1.15rem}.leader-inline.win{background:linear-gradient(90deg,rgba(255,255,255,.03),transparent);border-radius:14px;padding-left:8px;padding-right:8px}

    /* toast */
.toast{position:fixed;left:50%;top:20px;z-index:120;transform:translate(-50%,-120px);padding:12px 20px;border-radius:999px;background:#ffffff;color:#000000;font-size:.85rem;font-weight:800;box-shadow:0 12px 32px rgba(0,0,0,.25);transition:transform .3s cubic-bezier(0.34, 1.56, 0.64, 1);max-width:calc(100vw - 32px);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.toast.show{transform:translate(-50%,0)}

    @keyframes pulse{0%{opacity:1}50%{opacity:.5}100%{opacity:1}}

    .topbar-inner,.datebar,.picker-wrap,.section{width:min(100%, 760px)}
    .tb-logo,.badge-name,.music-title,.music-sub,.t-name,.chip,.save-btn,.locked-msg,.day-btn,.tb-btn{min-width:0}
    .match-card,.picker-card,.music-dock,.modal{max-width:100%}
    .pred-row{align-items:flex-start}
    .pred-chips{min-width:0}
    .chip{max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

    @media(max-width:560px){
      body{padding-bottom:calc(108px + env(safe-area-inset-bottom))}
      .topbar-inner{height:auto;min-height:60px;padding-top:10px;padding-bottom:10px;align-items:flex-start}
      .tb-left{min-width:0}
      .tb-right{align-self:center}
      .tb-logo{font-size:1.05rem}
      .tb-btn{height:36px;padding:0 12px;font-size:.78rem}
      .selected-badge{max-width:48vw}
      .datebar{height:48px;padding-top:2px;padding-bottom:2px}
      .day-btn{height:34px;padding:0 14px;font-size:.8rem}
      .picker-wrap,.section{padding-left:12px;padding-right:12px}
      .picker-head{padding:14px}
      .p-btn{padding:14px 10px;font-size:.86rem}
      .m-header{padding:10px 12px;font-size:.72rem}
      .m-body{padding:12px}
      .m-time-col{width:52px;padding-right:10px;margin-right:10px}
      .mt-main{font-size:.9rem}
      .t-flag{font-size:1.15rem}
      .t-name{font-size:.93rem}
      .t-score{font-size:1.05rem}
      .m-actions{padding:10px 12px}
      .pred-row{flex-direction:column;align-items:stretch;gap:10px}
      .pred-controls{width:100%;justify-content:space-between;flex-wrap:nowrap;overflow:hidden}
      .stepper{flex:0 0 auto}
      .save-btn,.locked-msg{flex:1;justify-content:center;text-align:center}
      .save-btn{padding:0 12px}
      .music-dock{width:min(calc(100vw - 20px),560px);padding:10px 12px;bottom:12px;border-radius:20px}
      .music-row{grid-template-columns:auto auto 1fr auto;gap:8px}
      .music-btn{width:38px;height:38px}
      .music-title{font-size:.8rem}
      .music-sub{font-size:.66rem}
      .visualizer{width:76px;height:34px;padding:0 6px}
      .bar{width:7px}
      .modal{padding:18px 16px calc(20px + env(safe-area-inset-bottom))}
    }

    @media(min-width:561px) and (max-width:899px){
      .topbar-inner,.datebar,.picker-wrap,.section{width:min(100%, 820px)}
      .pred-row{gap:12px}
      .pred-controls{flex-wrap:nowrap}
      .music-dock{width:min(calc(100vw - 28px),620px)}
    }

    @media(min-width:900px){
      body{padding-bottom:40px}
      .topbar-inner,.datebar,.picker-wrap,.section{width:min(100%, 980px)}
      .tb-logo{font-size:1.28rem}
      .section{margin-top:18px}
      .picker-grid{grid-template-columns:repeat(4,1fr)}
      .match-card{border-radius:20px}
      .m-body{padding:16px 18px}
      .m-time-col{width:72px;padding-right:16px;margin-right:16px}
      .mt-main{font-size:1.05rem}
      .mt-sub{font-size:.74rem}
      .t-name{font-size:1.02rem}
      .t-score{font-size:1.2rem}
      .pred-row{gap:16px}
      .pred-controls{padding:5px 6px}
      .music-dock{right:20px;left:auto;bottom:20px;transform:none;width:360px}
      .modal-overlay{align-items:center}
      .modal{border-radius:24px;max-height:80vh}
    }

    @media(min-width:1200px){
      .topbar-inner,.datebar,.picker-wrap,.section{width:min(100%, 1080px)}
      .music-dock{width:380px}
    }

    @media(orientation:landscape) and (max-width:900px){
      .music-dock{bottom:10px}
      .modal{max-height:88vh}
    }

    @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}
  </style>
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <div class="tb-left">
      <span class="tb-logo">⚽ Pishbini</span>
      <div class="selected-badge hidden" id="selectedBadge">
        <span class="badge-ava" id="badgeAva"></span>
        <span class="badge-name" id="badgeName"></span>
      </div>
    </div>
    <div class="tb-right">
      <button class="tb-btn" id="changeBtn" style="display:none">Change</button>
      <button class="tb-btn primary" id="boardBtn">🏆 Radbandi</button>
    </div>
  </div>
</header>

<div class="datebar-wrap">
  <div class="datebar">
    <button class="day-btn" data-view="finished">Finished</button>
    <button class="day-btn active" data-view="upcoming">Upcoming</button>
    <button class="day-btn" data-view="live">Live</button>
    <button class="day-btn" data-view="all">All</button>
  </div>
</div>

<div class="picker-wrap">
  <div class="picker-card" id="pickerCard">
    <div class="picker-head">
      <span class="pink-3d">Rooye esmet Bezan</span>
      <div class="picker-sub">Choose your name to start predicting</div>
    </div>
    <div class="picker-grid" id="pickerGrid"></div>
  </div>
</div>

<div class="section" id="matchSection">
  <div class="section-head" id="sectionLabel">Upcoming Matches</div>
  <div id="matchList"></div>
</div>

<div class="section" id="leaderSection">
  <div class="section-head">Leadeboard</div>
  <div class="picker-card" style="padding:14px">
    <div id="liveLeaderRows"></div>
  </div>
</div>

<div class="music-dock">
  <div class="music-row">
    <button class="music-btn" id="playPauseBtn">▶</button>
    <button class="music-btn" id="muteBtn">🔊</button>
    <div class="music-meta">
      <div class="music-title">Background Music</div>
      <div class="music-sub" id="musicState">Tap to play</div>
    </div>
    <div class="visualizer" id="visualizer">
      <span class="bar idle"></span><span class="bar alt idle"></span><span class="bar idle"></span><span class="bar alt idle"></span><span class="bar idle"></span><span class="bar alt idle"></span><span class="bar idle"></span>
    </div>
  </div>
</div>

<div class="modal-overlay" id="boardModal">
  <div class="modal">
    <div class="m-head"><div class="m-title">🏆 Radbandi</div><button class="close-btn" id="closeBoard">Close</button></div>
    <div id="leaderRows"></div>
  </div>
</div>

<div class="toast" id="toast"></div>
<audio id="bgMusic" preload="auto" loop playsinline autoplay src="music.mp3"></audio>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getDatabase, ref, set, onValue } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js';
const app = initializeApp({apiKey:'AIzaSyB3T6VN31aw7bezi7wJh9kBSdTuOdAfHGo',authDomain:'pishbini-bazi-ha.firebaseapp.com',databaseURL:'https://pishbini-bazi-ha-default-rtdb.firebaseio.com',projectId:'pishbini-bazi-ha',storageBucket:'pishbini-bazi-ha.firebasestorage.app',messagingSenderId:'195538591321',appId:'1:195538591321:web:63a099506ee9a1b3a49b48'});
const db = getDatabase(app);

const PLAYERS=[{id:'HANBA',ava:'✦'},{id:'YASIN BAMBA',ava:'◈'},{id:'AMA BAMBA',ava:'◆'},{id:'KAMBAB',ava:'✳'}];
const FLAGS={'Argentina':'🇦🇷','Australia':'🇦🇺','Belgium':'🇧🇪','Bolivia':'🇧🇴','Bosnia and Herzegovina':'🇧🇦','Brazil':'🇧🇷','Canada':'🇨🇦','Cameroon':'🇨🇲','Cape Verde':'🇨🇻','Chile':'🇨🇱','Colombia':'🇨🇴','Costa Rica':'🇨🇷','Croatia':'🇭🇷','Czech Republic':'🇨🇿','Denmark':'🇩🇰','Ecuador':'🇪🇨','Egypt':'🇪🇬','England':'🏴','France':'🇫🇷','Germany':'🇩🇪','Ghana':'🇬🇭','Guatemala':'🇬🇹','Honduras':'🇭🇳','Iceland':'🇮🇸','Iran':'🇮🇷','Jamaica':'🇯🇲','Japan':'🇯🇵','Mali':'🇲🇱','Mexico':'🇲🇽','Morocco':'🇲🇦','Netherlands':'🇳🇱','New Zealand':'🇳🇿','Nigeria':'🇳🇬','Norway':'🇳🇴','Panama':'🇵🇦','Paraguay':'🇵🇾','Peru':'🇵🇪','Poland':'🇵🇱','Portugal':'🇵🇹','Qatar':'🇶🇦','Saudi Arabia':'🇸🇦','Scotland':'🏴','Senegal':'🇸🇳','Serbia':'🇷🇸','South Africa':'🇿🇦','South Korea':'🇰🇷','Spain':'🇪🇸','Sweden':'🇸🇪','Switzerland':'🇨🇭','Tunisia':'🇹🇳','Turkey':'🇹🇷','Ukraine':'🇺🇦','United States':'🇺🇸','USA':'🇺🇸','Uruguay':'🇺🇾','Uzbekistan':'🇺🇿','Venezuela':'🇻🇪','Wales':'🏴','Czechia':'🇨🇿'};

const state={player:localStorage.getItem('pb_player')||null,view:localStorage.getItem('pb_view')||'upcoming',fixtures:{},results:{},livescores:{},predictions:{}};
const $=id=>document.getElementById(id);

window.stepVal=(id,delta)=>{const el=$(id);if(!el||el.disabled)return;let v=parseInt(el.value||0,10)+delta;if(v<0)v=0;if(v>20)v=20;el.value=v;if(navigator.vibrate)navigator.vibrate(8);};

// Strict chronological parsing
function parseRawTs(raw){
  if(!raw) return 0;
  const s = String(raw).trim();
  if(!s) return 0;
  const [dp, tp='00:00'] = s.split(' ');
  let y,m,d;
  if(dp.includes('/')){
    const p = dp.split('/').map(Number);
    if(p[0]>1000) [y,m,d]=p; else [m,d,y]=p;
  } else if(dp.includes('-')){
    const p = dp.split('-').map(Number);
    if(p[0]>1000) [y,m,d]=p; else [d,m,y]=p;
  } else return 0;
  const [hh='00', mm='00'] = tp.split(':');
  return new Date(y, m-1, d, Number(hh), Number(mm)).getTime();
}

function getExactTime(raw){
  if(!raw) return '--:--';
  const parts = String(raw).trim().split(' ');
  if(parts.length > 1){
    const timeStr = parts[parts.length - 1]; 
    return timeStr.split(':').slice(0,2).join(':'); 
  }
  return '--:--';
}

function startTs(m){ return parseRawTs(m.local_date); }
function hasStarted(m){ const ts=startTs(m); return ts ? Date.now()>=ts : false; }
function isFinished(m){ return String(m.finished||'').toUpperCase()==='TRUE'; }
function isLive(m){ return !isFinished(m)&&!!state.livescores[String(m.id)]; }
function resultDir(a,b){ return a===b?0:a>b?1:-1; }
function calcPoints(pid){let pts=0;Object.entries(state.results||{}).forEach(([id,r])=>{const p=state.predictions?.[pid]?.[id];if(!p)return;if(+p.g1===+r.g1&&+p.g2===+r.g2)pts+=3;else if(resultDir(+p.g1,+p.g2)===resultDir(+r.g1,+r.g2))pts+=1;});return pts;}
function showToast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');clearTimeout(window.__tt);window.__tt=setTimeout(()=>t.classList.remove('show'),2000);}

function syncPlayerUI(){
  const s=!!state.player;
  $('pickerCard').classList.toggle('hidden',s);
  $('selectedBadge').classList.toggle('hidden',!s);
  $('changeBtn').style.display=s?'flex':'none';
  if(state.player){
    const p=PLAYERS.find(x=>x.id===state.player);
    $('badgeAva').textContent=p?.ava||'';
    $('badgeName').textContent=state.player;
  }
}

function renderPlayers(){
  $('pickerGrid').innerHTML=PLAYERS.map(p=>`
    <button class="p-btn" data-player="${p.id}">
      <div class="p-ava">${p.ava}</div>
      <span>${p.id}</span>
    </button>`).join('');
  document.querySelectorAll('.p-btn').forEach(btn=>{
    btn.onclick=()=>{state.player=btn.dataset.player;localStorage.setItem('pb_player', state.player);syncPlayerUI();renderMatches();unlockAndAutoplayMusic();if(navigator.vibrate)navigator.vibrate([14,18,14]);showToast(`${state.player.split(' ')[0]} selected`);};
  });
}

function renderFilters(){
  document.querySelectorAll('.day-btn').forEach(btn=>{
    btn.classList.toggle('active',btn.dataset.view===state.view);
    btn.onclick=()=>{state.view=btn.dataset.view;localStorage.setItem('pb_view', state.view);renderMatches();renderFilters();};
  });
  const labels={upcoming:'Upcoming Matches',live:'Live Now',finished:'Finished Matches',all:'All Matches'};
  $('sectionLabel').textContent=labels[state.view]||'Matches';
}

function getBestPickSummary(matchId, res){
  if(!res) return '';
  const exact = [];
  const good = [];
  PLAYERS.forEach(p=>{
    const pr = state.predictions?.[p.id]?.[matchId];
    if(!pr) return;
    const shortName = p.id.split(' ')[0];
    if(+pr.g1===+res.g1 && +pr.g2===+res.g2) exact.push(shortName);
    else if(resultDir(+pr.g1,+pr.g2)===resultDir(+res.g1,+res.g2)) good.push(shortName);
  });
  const pills = [];
  if(exact.length) pills.push(`<span class="summary-pill exact">🎯 Exact: ${exact.join(', ')}</span>`);
  if(good.length) pills.push(`<span class="summary-pill good">✅ Correct side: ${good.join(', ')}</span>`);
  return pills.length ? `<div class="summary-row">${pills.join('')}</div>` : '';
}

function renderMatches(){
  const all=Object.values(state.fixtures||{}).filter(m=>m&&m.home_name&&m.away_name);
  let visible=all;
  if(state.view==='upcoming')visible=all.filter(m=>!isFinished(m)&&!hasStarted(m));
  if(state.view==='live')visible=all.filter(m=>isLive(m));
  if(state.view==='finished')visible=all.filter(m=>isFinished(m));

  visible.sort((a,b)=>startTs(a)-startTs(b));

  const root=$('matchList');
  if(!visible.length){root.innerHTML='<div style="text-align:center;padding:50px 0;color:var(--text-muted);font-size:.95rem;font-weight:700">No matches found</div>';return;}

  root.innerHTML=visible.map(m=>{
    const id=String(m.id);
    const live=isLive(m),fin=isFinished(m),started=hasStarted(m);
    const ls=state.livescores?.[id];
    const res=state.results?.[id];
    const myPred=state.player?state.predictions?.[state.player]?.[id]:null;
    const cannotSave=started||!state.player;

    let timeMain='',timeSub='';
    let g1='-',g2='-';
    let h1w=false,h2w=false;

    const exactTime = getExactTime(m.local_date);

    if(fin&&res){
      g1=res.g1;g2=res.g2;
      h1w=+res.g1>+res.g2;h2w=+res.g2>+res.g1;
      timeMain='FT';timeSub=exactTime;
    }else if(live&&ls){
      g1=ls.g1;g2=ls.g2;
      timeMain='LIVE';timeSub=ls.minute||'';
    }else{
      timeMain=exactTime;timeSub=started?'Ghofl':'Today';
    }

    const preds=PLAYERS.map(p=>{
      const pr=state.predictions?.[p.id]?.[id];
      if(!pr)return'';
      let cls='chip';
      if(fin&&res){if(+pr.g1===+res.g1&&+pr.g2===+res.g2)cls+=' exact';else if(resultDir(+pr.g1,+pr.g2)===resultDir(+res.g1,+res.g2))cls+=' good';}
      if(state.player===p.id) cls+=' mine';
      const shortName = p.id.split(' ')[0];
      return`<span class="${cls}"><span class="chip-name">${shortName}</span> ${pr.g1}-${pr.g2}</span>`;
    }).join('');
    const bestPickSummary = fin && res ? getBestPickSummary(id, res) : '';

    const pickHtml=cannotSave
      ?`<div class="locked-msg">${started?'🔒 Ghofl':'Choose a player to predict'}</div>`
      :`<div class="pred-controls">
          <div class="stepper"><button class="st-btn" onclick="window.stepVal('g1-${id}',-1)">−</button><input id="g1-${id}" class="st-val" type="number" value="${myPred?.g1??0}" readonly><button class="st-btn" onclick="window.stepVal('g1-${id}',1)">+</button></div>
          <span class="st-div">:</span>
          <div class="stepper"><button class="st-btn" onclick="window.stepVal('g2-${id}',-1)">−</button><input id="g2-${id}" class="st-val" type="number" value="${myPred?.g2??0}" readonly><button class="st-btn" onclick="window.stepVal('g2-${id}',1)">+</button></div>
          <button class="save-btn" data-id="${id}">Save</button>
        </div>`;

    return`
    <div class="match-card">
      <div class="m-header">
        <div class="m-header-left"><span class="m-icon">⚽</span> FIFA World Cup</div>
        <span>Group ${m.group||'-'}</span>
      </div>
      <div class="m-body">
        <div class="m-time-col">
          <span class="mt-main ${live?'live':''}">${timeMain}</span>
          <span class="mt-sub ${live?'live':''}">${timeSub}</span>
        </div>
        <div class="m-teams-col">
          <div class="t-row">
            <div class="t-left"><span class="t-flag">${FLAGS[m.home_name]||'🏳️'}</span><span class="t-name ${h1w?'winner':''}">${m.home_name}</span></div>
            <span class="t-score ${g1!=='-'?'':'empty'}">${g1}</span>
          </div>
          <div class="t-row">
            <div class="t-left"><span class="t-flag">${FLAGS[m.away_name]||'🏳️'}</span><span class="t-name ${h2w?'winner':''}">${m.away_name}</span></div>
            <span class="t-score ${g2!=='-'?'':'empty'}">${g2}</span>
          </div>
        </div>
      </div>
      <div class="m-actions">
        <div class="pred-row">
          <div class="pred-chips">${preds}</div>
          ${pickHtml}
        </div>
        ${bestPickSummary}
      </div>
    </div>`;
  }).join('');

  root.querySelectorAll('.save-btn').forEach(btn=>{
    btn.onclick=async()=>{
      const id=btn.dataset.id;
      const v1=$(`g1-${id}`).value,v2=$(`g2-${id}`).value;
      btn.textContent='...';btn.disabled=true;
      await set(ref(db,`worldcup/shared/predictions/${state.player}/${id}`),{g1:+v1,g2:+v2,ts:Date.now()});
      btn.textContent='✓ Saved';btn.classList.add('saved');
      setTimeout(()=>{btn.textContent='Save';btn.disabled=false;btn.classList.remove('saved');},1600);
      if(navigator.vibrate)navigator.vibrate([16,20,16]);
      showToast(`${state.player.split(' ')[0]}: ${v1} - ${v2}`);
    };
  });
}

function updateLeadeboard(){
  const rows=PLAYERS.map(p=>({name:p.id,ava:p.ava,pts:calcPoints(p.id),pick:Object.keys(state.predictions?.[p.id]||{}).length})).sort((a,b)=>b.pts-a.pts||b.pick-a.pick||a.name.localeCompare(b.name));
  const modalHtml=rows.map((r,i)=>`<div class="leader-row"><div class="rank">${i===0?'👑':i+1}</div><div><div class="lname">${r.ava} ${r.name}</div><div class="lsub">${r.pick} pick</div></div><div class="pts">${r.pts}</div></div>`).join('') || '<div class="lsub">هنوز picki sabt nashode</div>';
  const inlineHtml=rows.map((r,i)=>`<div class="leader-inline ${i===0?'win':''}"><div class="rank">${i===0?'👑':i+1}</div><div><div class="lname">${r.name}</div><div class="lsub">${r.pick} pick</div></div><div class="pts">${r.pts}</div></div>`).join('') || '<div class="lsub">هنوز picki sabt nashode</div>';
  const modalEl=$('leaderRows'); const inlineEl=$('liveLeaderRows');
  if(modalEl) modalEl.innerHTML=modalHtml;
  if(inlineEl) inlineEl.innerHTML=inlineHtml;
}

// ── Music + Visualizer ──
const music=$('bgMusic');
const bars=[...document.querySelectorAll('.bar')];
let audioUnlocked=false,audioCtx=null,analyser=null,sourceNode=null,freqData=null,visRAF=null;

function updateMusicUI(){$('playPauseBtn').textContent=music.paused?'▶':'❚❚';$('muteBtn').textContent=music.muted?'🔇':'🔊';$('musicState').textContent=audioUnlocked?(music.paused?'Paused':'Playing'):'Tap to play';}
function paintIdle(){bars.forEach((b,i)=>{b.style.height=`${8+i%3*3}px`;b.classList.add('idle');b.style.filter='none';});}
function ensureGraph(){if(audioCtx)return;audioCtx=new(window.AudioContext||window.webkitAudioContext)();analyser=audioCtx.createAnalyser();analyser.fftSize=64;analyser.smoothingTimeConstant=.82;freqData=new Uint8Array(analyser.frequencyBinCount);sourceNode=audioCtx.createMediaElementSource(music);sourceNode.connect(analyser);analyser.connect(audioCtx.destination);}
function animVis(){if(visRAF)cancelAnimationFrame(visRAF);const tick=()=>{if(!analyser||music.paused||music.muted){paintIdle();visRAF=requestAnimationFrame(tick);return;}analyser.getByteFrequencyData(freqData);bars.forEach((b,i)=>{const idx=Math.min(freqData.length-1,Math.floor((i+1)*freqData.length/(bars.length+1)));const v=freqData[idx]||0;const h=8+(v/255)*28;const isPink=(i+Math.round(performance.now()/300))%2===0;const c1=isPink?'#ff9de1':'#b8ffd0';const c2=isPink?'#ff4fc3':'#10b981';b.classList.remove('idle');b.style.height=`${h}px`;b.style.background=`linear-gradient(180deg,${c1},${c2})`;b.style.filter=`drop-shadow(0 0 ${4+v/28}px ${c2})`;});visRAF=requestAnimationFrame(tick);};tick();}
async function tryPlay(){if(!music.currentSrc)return;try{ensureGraph();if(audioCtx.state==='suspended')await audioCtx.resume();await music.play();animVis();updateMusicUI();}catch(e){updateMusicUI();}}
async function unlockAndAutoplayMusic(){audioUnlocked=true;localStorage.setItem('pb_unlocked','1');await tryPlay();}
function initMusic(){music.volume=.42;if(localStorage.getItem('pb_unlocked')==='1'){audioUnlocked=true;tryPlay();}paintIdle();const once=()=>{if(!audioUnlocked)unlockAndAutoplayMusic();document.removeEventListener('click',once);document.removeEventListener('touchstart',once);};document.addEventListener('click',once,{passive:true});document.addEventListener('touchstart',once,{passive:true});$('playPauseBtn').onclick=async()=>{audioUnlocked=true;localStorage.setItem('pb_unlocked','1');if(music.paused)await tryPlay();else{music.pause();paintIdle();}updateMusicUI();};$('muteBtn').onclick=()=>{music.muted=!music.muted;updateMusicUI();if(music.muted)paintIdle();};music.addEventListener('play',()=>{animVis();updateMusicUI();});music.addEventListener('pause',()=>{paintIdle();updateMusicUI();});updateMusicUI();}

$('changeBtn').onclick=()=>{state.player=null;localStorage.removeItem('pb_player');syncPlayerUI();renderMatches();showToast('Choose player again');};
$('boardBtn').onclick=()=>$('boardModal').classList.add('open');
$('closeBoard').onclick=()=>$('boardModal').classList.remove('open');
$('boardModal').onclick=e=>{if(e.target.id==='boardModal')e.currentTarget.classList.remove('open');};

let booted=false;
$('boardBtn').onclick=()=>{$('boardModal').classList.add('open');};
$('closeBoard').onclick=()=>{$('boardModal').classList.remove('open');};
$('boardModal').onclick=e=>{if(e.target.id==='boardModal')$('boardModal').classList.remove('open');};
initMusic();
onValue(ref(db,'worldcup/shared'),snap=>{
  const d=snap.val()||{};
  state.fixtures=d.fixtures||{};state.results=d.results||{};state.livescores=d.livescores||{};state.predictions=d.predictions||{};
  if(!booted){renderPlayers();booted=true;}
  renderFilters();syncPlayerUI();renderMatches();updateLeadeboard();
});
</script>
