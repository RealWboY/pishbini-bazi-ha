<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bebinim Ki Dorost Mige</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root,[data-theme="light"]{--bg:#f6f6f3;--surface:#ffffff;--soft:#f1f1ed;--line:#e3e3dd;--line-2:#cecec7;--text:#101010;--muted:#72726b;--faint:#a0a098;--shadow:0 10px 24px rgba(0,0,0,.05);--t-xs:clamp(.76rem,.73rem + .08vw,.84rem);--t-sm:clamp(.92rem,.88rem + .1vw,1rem);--t:clamp(1rem,.98rem + .1vw,1.05rem);--t-lg:clamp(1.2rem,1.08rem + .3vw,1.38rem);--t-xl:clamp(2rem,1.55rem + .9vw,2.7rem);--t-xxl:clamp(2.2rem,1.8rem + 1vw,3.5rem);--font:'Inter',sans-serif;}
    [data-theme="dark"]{--bg:#0f0f0f;--surface:#171717;--soft:#202020;--line:#2f2f2f;--line-2:#3e3e3e;--text:#f5f5f2;--muted:#b8b8b0;--faint:#7f7f78;--shadow:0 10px 24px rgba(0,0,0,.24)}
    *{box-sizing:border-box;margin:0;padding:0} html{-webkit-font-smoothing:antialiased;scroll-behavior:smooth}
    body{font-family:var(--font);font-size:var(--t);background:var(--bg);color:var(--text);line-height:1.5;min-height:100dvh} button,input{font:inherit;color:inherit} button{border:none;background:none;cursor:pointer} input{outline:none}
    .container{max-width:980px;margin:0 auto;padding:0 18px}
    .header{position:sticky;top:0;z-index:30;background:color-mix(in oklab,var(--bg) 90%,transparent);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
    .header-inner{height:72px;display:flex;align-items:center;justify-content:space-between;gap:12px}
    .brand{display:flex;align-items:center;gap:12px;font-weight:900;letter-spacing:-.06em;font-size:clamp(.85rem,.7rem + .5vw,1.1rem)}
    .mark{width:36px;height:36px;border:1.4px solid currentColor;border-radius:999px;display:grid;place-items:center;flex-shrink:0} .mark svg{width:18px;height:18px}
    .hbtns{display:flex;gap:8px}
    .theme-btn,.board-btn,.profile,.save-btn,.filter{min-height:44px;padding:0 14px;border:1px solid var(--line);border-radius:999px;background:var(--surface);transition:.18s ease;white-space:nowrap} .theme-btn:hover,.board-btn:hover,.filter:hover,.profile:hover{background:var(--soft)}
    .hero{padding:34px 0 0}.eyebrow{font-size:var(--t-xs);color:var(--muted);text-transform:uppercase;letter-spacing:.18em;margin-bottom:10px}
    h1{font-size:var(--t-xxl);line-height:.95;letter-spacing:-.08em;font-weight:900}
    .intro{margin:18px 0 0;padding:18px;border:1px solid var(--line);border-radius:24px;background:var(--surface);box-shadow:var(--shadow);display:flex;gap:14px;align-items:flex-start} .intro .arrow{font-size:22px;flex-shrink:0} .intro p{color:var(--text);font-size:var(--t-sm);line-height:1.65}
    .controls{padding:18px 0 10px;display:flex;flex-direction:column;gap:14px}
    .row{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;align-items:center}
    .profiles{display:flex;gap:8px;flex-wrap:wrap}
    .filter.active,.save-btn{background:var(--text);color:var(--bg);border-color:var(--text)}
    .profile[data-player="HANBA"]{background:#fde68a;border-color:#f5c518;color:#111}
    .profile[data-player="YASIN BAMBA"]{background:#bfdbfe;border-color:#3b82f6;color:#111}
    .profile[data-player="AMA BAMBA"]{background:#c7f9cc;border-color:#22c55e;color:#111}
    .profile[data-player="KAMBAB"]{background:#fbcfe8;border-color:#ec4899;color:#111}
    .profile.active{font-weight:800;box-shadow:0 4px 16px rgba(0,0,0,.14);transform:scale(1.04)}
    .stats{display:flex;gap:8px;flex-wrap:wrap} .stat{padding:8px 12px;border:1px solid var(--line);border-radius:999px;background:var(--surface);font-size:var(--t-sm)}
    .filters{display:flex;gap:8px;flex-wrap:wrap}
    .section{padding:18px 0 44px} .section-head{display:flex;justify-content:space-between;gap:12px;align-items:end;margin-bottom:14px} .section-head h2{font-size:var(--t-lg);letter-spacing:-.05em;font-weight:800} .section-head p{font-size:var(--t-xs);color:var(--faint);text-transform:uppercase;letter-spacing:.12em}
    .list{display:grid;gap:12px} .card{background:var(--surface);border:1px solid var(--line);border-radius:28px;padding:20px;box-shadow:var(--shadow)} .live-card{border-color:var(--text);box-shadow:0 0 0 2px var(--text),var(--shadow)}
    .meta{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:14px;color:var(--muted);font-size:var(--t-xs)}
    .main-grid{display:grid;grid-template-columns:1fr auto 1fr;gap:14px;align-items:center} .team{text-align:center} .flag{font-size:36px;line-height:1;margin-bottom:6px} .name{font-size:var(--t-sm);font-weight:800} .center{text-align:center} .time{font-size:var(--t-lg);font-weight:900;letter-spacing:-.05em} .label{font-size:var(--t-xs);color:var(--faint);margin-top:4px}
    .predict{margin-top:16px;padding-top:16px;border-top:1px solid var(--line);display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;align-items:center}
    .score-inputs{display:flex;gap:8px;align-items:center} .num{width:58px;height:46px;border:1px solid var(--line-2);border-radius:14px;background:var(--soft);text-align:center;font-weight:900;font-size:1.1rem} .num:focus{border-color:var(--text)} .num:disabled{opacity:.55;cursor:not-allowed}
    .save-btn{font-weight:800} .save-btn.locked{background:var(--soft);color:var(--muted);border-color:var(--line-2);cursor:not-allowed}
    .chips{display:flex;gap:8px;flex-wrap:wrap;width:100%;margin-top:6px} .chip{padding:7px 10px;border-radius:999px;background:var(--soft);border:1px solid var(--line);font-size:var(--t-xs)} .chip.live{background:var(--text);color:var(--bg)}
    .empty{padding:40px 18px;text-align:center;color:var(--muted);border:1px dashed var(--line-2);border-radius:28px}
    .modal-wrap{position:fixed;inset:0;background:rgba(0,0,0,.38);display:none;align-items:center;justify-content:center;padding:18px;z-index:60} .modal-wrap.open{display:flex} .modal{width:min(520px,100%);background:var(--surface);border:1px solid var(--line);border-radius:24px;padding:20px;box-shadow:var(--shadow)} .modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px} .modal-head h3{font-size:var(--t-lg);font-weight:800;letter-spacing:-.05em}
    .leader{display:grid;gap:0} .leader-row{display:grid;grid-template-columns:32px 1fr auto;gap:12px;padding:14px 0;border-top:1px solid var(--line);align-items:center} .leader-row:first-child{border-top:none} .rank{font-size:1.1rem}
    .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(80px);background:var(--text);color:var(--bg);padding:13px 22px;border-radius:999px;font-size:var(--t-sm);font-weight:700;transition:.2s ease;z-index:80;white-space:nowrap} .toast.show{transform:translateX(-50%) translateY(0)}
    @media (max-width:720px){.main-grid{grid-template-columns:1fr;gap:14px}.center{order:2}.predict{align-items:stretch}.save-btn{width:100%}.score-inputs{width:100%;justify-content:center}.header-inner{height:auto;padding:10px 0;flex-wrap:wrap}.brand{font-size:.82rem}}
  </style>
</head>
<body>
  <header class="header">
    <div class="container header-inner">
      <div class="brand">
        <div class="mark"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="8"/><path d="M12 4v16M4 12h16"/></svg></div>
        <span>BEBINIM KI DOROST MIGE AMOOOOO A</span>
      </div>
      <div class="hbtns">
        <button class="board-btn" id="boardBtn" type="button">Leaderboard</button>
        <button class="theme-btn" id="themeBtn" type="button">Theme</button>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="hero">
      <div class="eyebrow">World Cup 2026 · Predictions</div>
      <h1>Pishbini Bazi Ha</h1>
      <div class="intro">
        <div class="arrow">⚠️</div>
        <p><strong>حتماً اول روی اسم خودت کلیک کن، بعد پیش‌بینی‌ات را ثبت کن — تا به نام خودت ذخیره شود.</strong><br><span style="color:var(--muted);font-size:var(--t-xs)">Each prediction is locked after saving. One chance per match per player.</span></p>
      </div>
    </section>

    <section class="controls">
      <div class="row">
        <div class="profiles">
          <button class="profile active" data-player="HANBA" type="button">HANBA</button>
          <button class="profile" data-player="YASIN BAMBA" type="button">YASIN BAMBA</button>
          <button class="profile" data-player="AMA BAMBA" type="button">AMA BAMBA</button>
          <button class="profile" data-player="KAMBAB" type="button">KAMBAB</button>
        </div>
      </div>
      <div class="row">
        <div class="stats" id="statsBar"></div>
        <div class="filters">
          <button class="filter active" data-view="live" type="button">Live</button>
          <button class="filter" data-view="today" type="button">Today</button>
          <button class="filter" data-view="tomorrow" type="button">Tomorrow</button>
          <button class="filter" data-view="all" type="button">All</button>
        </div>
      </div>
    </section>

    <section class="section">
      <div class="section-head"><div><h2 id="sectionTitle">Live Games</h2><p id="sectionSub">today</p></div></div>
      <div class="list" id="list"></div>
    </section>
  </main>

  <div class="modal-wrap" id="leaderModal">
    <div class="modal">
      <div class="modal-head"><h3>Leaderboard</h3><button class="theme-btn" id="closeBoard" type="button">Close</button></div>
      <div class="leader" id="leaderContent"></div>
    </div>
  </div>

  <div class="toast" id="toast">Saved</div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
    import { getAnalytics } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics.js';
    import { getDatabase, ref, set, onValue } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js';

    const firebaseConfig = {
      apiKey:"AIzaSyB3T6VN31aw7bezi7wJh9kBSdTuOdAfHGo",
      authDomain:"pishbini-bazi-ha.firebaseapp.com",
      databaseURL:"https://pishbini-bazi-ha-default-rtdb.firebaseio.com",
      projectId:"pishbini-bazi-ha",
      storageBucket:"pishbini-bazi-ha.firebasestorage.app",
      messagingSenderId:"195538591321",
      appId:"1:195538591321:web:63a099506ee9a1b3a49b48",
      measurementId:"G-7GTHHG6N3C"
    };

    const app = initializeApp(firebaseConfig);
    try { getAnalytics(app); } catch(e) {}
    const db = getDatabase(app);

    const PLAYERS = ['HANBA','YASIN BAMBA','AMA BAMBA','KAMBAB'];

    const matches = [
      {id:1, state:'live', day:'today', date:'Sun, Jun 14', time:'19:00', group:'Group E', venue:'Philadelphia', t1:'🇨🇮', n1:'Ivory Coast', t2:'🇪🇨', n2:'Ecuador'},
      {id:2, state:'today', day:'today', date:'Sun, Jun 14', time:'21:00', group:'Group F', venue:'Dallas', t1:'🇳🇱', n1:'Netherlands', t2:'🇯🇵', n2:'Japan'},
      {id:3, state:'today', day:'today', date:'Sun, Jun 14', time:'23:00', group:'Group F', venue:'Monterrey', t1:'🇹🇳', n1:'Tunisia', t2:'🏳️', n2:'UEFA Qualifier'},
      {id:4, state:'tomorrow', day:'tomorrow', date:'Mon, Jun 15', time:'18:00', group:'Group G', venue:'Seattle', t1:'🇧🇪', n1:'Belgium', t2:'🇪🇬', n2:'Egypt'},
      {id:5, state:'tomorrow', day:'tomorrow', date:'Mon, Jun 15', time:'20:00', group:'Group G', venue:'Los Angeles', t1:'🇮🇷', n1:'Iran', t2:'🇳🇿', n2:'New Zealand'},
      {id:6, state:'tomorrow', day:'tomorrow', date:'Mon, Jun 15', time:'22:00', group:'Group H', venue:'Miami', t1:'🇺🇾', n1:'Uruguay', t2:'🇨🇻', n2:'Cape Verde'}
    ];

    const state = { player:'HANBA', view:'live', predictions:{}, results:{}, locks:{} };

    const $ = id => document.getElementById(id);
    const toast = msg => { const t=$('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(window._tt); window._tt=setTimeout(()=>t.classList.remove('show'),2000); };
    const isLocked = (player, id) => !!(state.locks?.[player]?.[id]);
    const winner = (a,b) => a===b ? 0 : (a>b ? 1 : -1);
    const points = player => { let p=0; Object.entries(state.results).forEach(([id,res])=>{ const pr=state.predictions[player]?.[id]; if(!pr) return; if(winner(pr.g1,pr.g2)===winner(res.g1,res.g2)) p+=1; }); return p; };
    const visibleMatches = () => {
      if(state.view==='all') return matches;
      if(state.view==='today') return matches.filter(m=>m.day==='today'||m.state==='live');
      if(state.view==='tomorrow') return matches.filter(m=>m.day==='tomorrow');
      return matches.filter(m=>m.state==='live');
    };

    function render() { renderProfiles(); renderStats(); renderFilters(); renderList(); renderBoard(); }

    function renderProfiles() {
      document.querySelectorAll('.profile').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.player===state.player);
        btn.onclick = () => { state.player=btn.dataset.player; render(); };
      });
    }

    function renderStats() {
      $('statsBar').innerHTML = PLAYERS.map(p => `<div class="stat">${p.split(' ')[0]} <strong>${points(p)}</strong></div>`).join('');
    }

    function renderFilters() {
      document.querySelectorAll('.filter').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.view===state.view);
        btn.onclick = () => { state.view=btn.dataset.view; renderList(); renderFilters(); };
      });
      const titles = {live:'Live Games',today:"Today's Games",tomorrow:"Tomorrow's Games",all:'All Games'};
      const subs = {live:'live now',today:'today',tomorrow:'tomorrow',all:'full schedule'};
      $('sectionTitle').textContent = titles[state.view];
      $('sectionSub').textContent = subs[state.view];
    }

    function renderList() {
      const root = $('list');
      const arr = visibleMatches();
      if(!arr.length) { root.innerHTML='<div class="empty">No match in this view.</div>'; return; }
      root.innerHTML = arr.map(m => {
        const locked = isLocked(state.player, m.id);
        const mine = state.predictions[state.player]?.[m.id];
        const pChips = PLAYERS.map(pl => {
          const pr = state.predictions[pl]?.[m.id];
          return pr ? `<span class="chip">${pl.split(' ')[0]} ${pr.g1}-${pr.g2}</span>` : '';
        }).join('');
        return `<article class="card ${m.state==='live'?'live-card':''}">
          <div class="meta"><span>${m.group} · ${m.venue}</span><span>${m.date}</span></div>
          <div class="main-grid">
            <div class="team"><div class="flag">${m.t1}</div><div class="name">${m.n1}</div></div>
            <div class="center"><div class="time">${m.time}</div><div class="label">${m.state==='live'?'🔴 Live now':'Kickoff'}</div></div>
            <div class="team"><div class="flag">${m.t2}</div><div class="name">${m.n2}</div></div>
          </div>
          <div class="predict">
            <div class="score-inputs">
              <input class="num" id="g1-${m.id}" type="number" min="0" max="20" value="${mine?mine.g1:''}" ${locked?'disabled':''}>
              <span style="font-weight:900;font-size:1.2rem">-</span>
              <input class="num" id="g2-${m.id}" type="number" min="0" max="20" value="${mine?mine.g2:''}" ${locked?'disabled':''}>
            </div>
            <button class="save-btn ${locked?'locked':''}" data-save="${m.id}" type="button">${locked?'🔒 Locked':'Save'}</button>
            <div class="chips">${m.state==='live'?'<span class="chip live">Live</span>':''}${pChips}</div>
          </div>
        </article>`;
      }).join('');
      root.querySelectorAll('[data-save]').forEach(btn => btn.onclick = () => savePick(Number(btn.dataset.save)));
    }

    async function savePick(id) {
      if(isLocked(state.player, id)) { toast('DAYOOOS YEBARE FAGHAT :D'); return; }
      const a=$(`g1-${id}`), b=$(`g2-${id}`);
      if(a.value===''||b.value==='') { toast('Score ro kamel kon'); return; }
      await set(ref(db, `worldcup/shared/predictions/${state.player}/${id}`), {g1:Number(a.value),g2:Number(b.value),ts:Date.now()});
      await set(ref(db, `worldcup/shared/locks/${state.player}/${id}`), true);
      toast('Saved ✓');
    }

    function renderBoard() {
      const rows = PLAYERS.map(p=>({name:p,pts:points(p),picks:Object.keys(state.predictions[p]||{}).length})).sort((a,b)=>b.pts-a.pts);
      const medals = ['🥇','🥈','🥉','4️⃣'];
      $('leaderContent').innerHTML = rows.map((r,i)=>`<div class="leader-row"><div class="rank">${medals[i]}</div><div><strong>${r.name}</strong><div style="font-size:12px;color:var(--muted)">${r.picks} picks</div></div><div style="font-size:1.3rem;font-weight:900">${r.pts}</div></div>`).join('');
    }

    $('boardBtn').onclick = () => $('leaderModal').classList.add('open');
    $('closeBoard').onclick = () => $('leaderModal').classList.remove('open');
    $('leaderModal').onclick = e => { if(e.target.id==='leaderModal') e.currentTarget.classList.remove('open'); };
    $('themeBtn').onclick = () => { const h=document.documentElement; h.setAttribute('data-theme',h.getAttribute('data-theme')==='dark'?'light':'dark'); };

    onValue(ref(db,'worldcup/shared'), snap => {
      const d = snap.val()||{};
      state.predictions = d.predictions||{};
      state.results = d.results||{};
      state.locks = d.locks||{};
      render();
    });

    render();
  </script>
</body>
</html>
