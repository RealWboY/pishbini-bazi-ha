<!DOCTYPE html>
<html lang="fa" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no" />
  <title>Pishbini Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#070a1a;
      --card:rgba(255,255,255,.07);
      --border:rgba(255,255,255,.1);
      --text:#f7f7f5;
      --muted:rgba(247,247,245,.5);
      --green:#4ade80;
      --gold:#ffd700;
      --red:#ff5f77;
      --blur:blur(20px) saturate(160%);
      --font:'Inter',system-ui,sans-serif;
      --radius:24px;
    }
    *{box-sizing:border-box;margin:0;padding:0;touch-action:manipulation}
    html{-webkit-font-smoothing:antialiased;scroll-behavior:smooth}
    body{min-height:100vh;font-family:var(--font);color:var(--text);background:linear-gradient(135deg,#2b125a 0%,#1a1e4a 32%,#0b4550 72%,#065b5e 100%);background-attachment:fixed;padding-bottom:100px}
    button,input{font:inherit;color:inherit;border:none;background:none;outline:none}
    button{cursor:pointer;-webkit-tap-highlight-color:transparent}
    .$ .wrap{max-width:740px;margin:0 auto;padding:0 16px;position:relative;z-index:1}

    /* TOPBAR */
    .topbar{position:sticky;top:0;z-index:60;padding:14px 16px;backdrop-filter:var(--blur);background:rgba(8,11,27,.35);border-bottom:1px solid var(--border)}
    .topbar-in{max-width:740px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
    .brand{font-weight:900;letter-spacing:-.04em;font-size:1.1rem;text-shadow:0 0 12px rgba(255,255,255,.25)}
    .ghost{padding:8px 16px;border-radius:999px;background:rgba(255,255,255,.15);font-weight:800;font-size:.85rem;backdrop-filter:var(--blur);transition:.2s;box-shadow:0 4px 15px rgba(0,0,0,.2)}
    .ghost:active{transform:scale(.95)}

    /* CONTENT */
    .wrap{max-width:740px;margin:0 auto;padding:0 16px}
    .hero{padding:28px 0 16px}
    .hero h1{font-size:clamp(2.2rem,6vw,4rem);font-weight:900;line-height:.9;letter-spacing:-.06em;background:linear-gradient(to right,#fff,#a5b4fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent}

    /* PLAYERS */
    .players{margin-top:22px;display:flex;gap:10px;flex-wrap:wrap}
    .player{display:flex;align-items:center;gap:8px;padding:11px 18px;border-radius:20px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);font-weight:800;font-size:.92rem;backdrop-filter:var(--blur);transition:.3s cubic-bezier(.175,.885,.32,1.275)}
    .player.active{background:rgba(255,255,255,.22);border-color:#fff;transform:translateY(-3px) scale(1.04);box-shadow:0 8px 22px rgba(0,0,0,.3)}
    .p-ava{font-size:1.15rem}

    /* FILTERS */
    .filters{margin-top:26px;display:flex;gap:10px;padding-bottom:4px;overflow-x:auto;scrollbar-width:none}
    .filters::-webkit-scrollbar{display:none}
    .filter{padding:10px 20px;border-radius:999px;background:rgba(255,255,255,.08);font-weight:800;font-size:.85rem;white-space:nowrap;transition:.2s}
    .filter.active{background:#fff;color:#000;box-shadow:0 0 16px rgba(255,255,255,.35)}

    /* MATCH LIST */
    .list{display:grid;gap:22px;padding-top:12px}

    /* MATCH CARD */
    .match{background:linear-gradient(145deg,rgba(255,255,255,.08),rgba(255,255,255,.02));border-radius:28px;padding:22px;box-shadow:0 14px 30px rgba(0,0,0,.3);backdrop-filter:var(--blur);border:1px solid rgba(255,255,255,.1);transition:transform .3s ease,box-shadow .3s ease}
    @keyframes heartbeat{0%{box-shadow:0 0 0 0 rgba(74,222,128,.5),0 14px 30px rgba(0,0,0,.3)}70%{box-shadow:0 0 0 14px rgba(74,222,128,0),0 14px 30px rgba(0,0,0,.3)}100%{box-shadow:0 0 0 0 rgba(74,222,128,0),0 14px 30px rgba(0,0,0,.3)}}
    .match.live{animation:heartbeat 2s infinite;border-color:rgba(74,222,128,.5);background:linear-gradient(145deg,rgba(74,222,128,.08),rgba(255,255,255,.02))}
    .meta{display:flex;justify-content:space-between;font-size:.73rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:18px}
    .score-area{display:flex;align-items:center;justify-content:space-between}
    .team-col{display:flex;flex-direction:column;align-items:center;width:30%}
    .flag-wrap{font-size:3.2rem;line-height:1;margin-bottom:10px;filter:drop-shadow(0 8px 12px rgba(0,0,0,.4))}
    .team-name{font-size:1.05rem;font-weight:800;text-align:center}
    .center-col{display:flex;flex-direction:column;align-items:center;width:40%}
    .score-row{display:flex;align-items:center;gap:14px;font-size:3.6rem;font-weight:900;font-variant-numeric:tabular-nums;line-height:1;text-shadow:0 8px 18px rgba(0,0,0,.4)}
    .vs-cup{font-size:2rem;filter:drop-shadow(0 4px 8px rgba(0,0,0,.5))}
    .time-status{margin-top:13px;font-size:1.1rem;font-weight:900;color:var(--green);text-shadow:0 0 10px rgba(74,222,128,.4)}
    .time-status.upcoming{color:var(--muted);font-size:1rem;text-shadow:none}
    .time-status.finished{color:#a5b4fc;font-size:1rem;text-shadow:none}

    /* PREDICT */
    .predict{margin-top:22px;padding-top:22px;border-top:1px dashed rgba(255,255,255,.14)}
    .entry{display:flex;align-items:center;justify-content:space-between;gap:14px;background:rgba(0,0,0,.25);padding:11px;border-radius:22px;box-shadow:inset 0 4px 10px rgba(0,0,0,.28)}
    .stepper-group{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,.05);border-radius:16px;padding:4px;border:1px solid rgba(255,255,255,.1)}
    .step-btn{width:38px;height:38px;border-radius:12px;background:rgba(255,255,255,.1);color:#fff;font-size:1.4rem;font-weight:900;display:flex;align-items:center;justify-content:center;transition:.1s}
    .step-btn:active{background:rgba(255,255,255,.28);transform:scale(.9)}
    .step-btn:disabled{opacity:.3;transform:none}
    .box{width:34px;text-align:center;font-size:1.45rem;font-weight:900;color:#fff;background:transparent;border:none;-moz-appearance:textfield}
    .box::-webkit-outer-spin-button,.box::-webkit-inner-spin-button{-webkit-appearance:none}
    .dash{font-weight:900;color:rgba(255,255,255,.3);font-size:1.4rem}
    .save{padding:14px 22px;border-radius:16px;background:linear-gradient(135deg,#4ade80,#10b981);color:#000;font-weight:900;font-size:.95rem;transition:.2s;box-shadow:0 7px 18px rgba(16,185,129,.38);white-space:nowrap}
    .save:active:not(:disabled){transform:scale(.93);box-shadow:0 4px 10px rgba(16,185,129,.38)}
    .save:disabled{background:rgba(255,255,255,.1);color:var(--muted);box-shadow:none}
    .save.locked{background:rgba(255,95,119,.15);color:#ff5f77;box-shadow:none}

    /* PREDS */
    .all-preds{margin-top:16px;display:flex;gap:9px;flex-wrap:wrap}
    .pred-tag{display:flex;align-items:center;gap:5px;padding:7px 13px;border-radius:14px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);font-size:.83rem;font-weight:800;color:var(--muted);transition:.3s}
    .pred-tag .ava{font-size:1rem}
    @keyframes glowGold{0%{box-shadow:0 0 5px rgba(255,215,0,.5)}50%{box-shadow:0 0 20px rgba(255,215,0,.8)}100%{box-shadow:0 0 5px rgba(255,215,0,.5)}}
    .pred-tag.exact{color:var(--gold);background:rgba(255,215,0,.15);border-color:var(--gold);animation:glowGold 2s infinite;transform:scale(1.04)}
    .pred-tag.good{color:var(--green);background:rgba(74,222,128,.14);border-color:var(--green)}
    .pred-tag.bad{opacity:.6}
    .pred-tag.mine{outline:2px solid rgba(255,255,255,.3);outline-offset:1px}
    .summary-row{margin-top:10px;display:flex;gap:8px;flex-wrap:wrap}
    .summ-pill{height:26px;padding:0 11px;border-radius:999px;display:inline-flex;align-items:center;font-size:.73rem;font-weight:800}
    .summ-pill.exact{background:rgba(255,215,0,.15);border:1px solid var(--gold);color:var(--gold)}
    .summ-pill.good{background:rgba(74,222,128,.12);border:1px solid var(--green);color:var(--green)}

    /* LEADERBOARD SECTION */
    .lb-section{max-width:740px;margin:26px auto 0;padding:0 16px}
    .lb-head{font-size:.73rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;padding-left:4px}
    .lb-surface{background:linear-gradient(145deg,rgba(255,255,255,.08),rgba(255,255,255,.02));border-radius:24px;padding:10px 14px;border:1px solid rgba(255,255,255,.1);box-shadow:0 14px 30px rgba(0,0,0,.28);backdrop-filter:var(--blur)}
    .lb-row{display:grid;grid-template-columns:36px 1fr auto auto;gap:10px;align-items:center;padding:11px 0;border-top:1px solid rgba(255,255,255,.06)}
    .lb-row:first-child{border-top:none}
    .lb-rank{width:30px;height:30px;border-radius:999px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:900}
    .lb-name{font-size:.92rem;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .lb-picks{font-size:.74rem;color:var(--muted);font-weight:700;margin-top:2px}
    .lb-pts{font-size:1.3rem;font-weight:900;letter-spacing:-.02em;text-align:right}
    .lb-btn{height:30px;padding:0 12px;border-radius:999px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);font-size:.73rem;font-weight:900;white-space:nowrap;transition:.15s}
    .lb-btn:active{background:rgba(255,255,255,.2)}
    .lb-row.first .lb-name{color:var(--gold)}
    .lb-row.first .lb-pts{color:var(--gold)}

    /* MODALS */
    .modal-wrap{position:fixed;inset:0;background:rgba(0,0,0,.72);backdrop-filter:blur(12px);display:none;align-items:center;justify-content:center;z-index:100;opacity:0;transition:opacity .3s ease;padding:16px}
    .modal-wrap.open{display:flex;opacity:1}
    .modal{width:min(480px,100%);max-height:85vh;overflow-y:auto;background:linear-gradient(135deg,#1e2345,#11152c);padding:28px;border-radius:28px;border:1px solid rgba(255,255,255,.1);box-shadow:0 24px 48px rgba(0,0,0,.5);transform:translateY(28px);transition:transform .3s cubic-bezier(.175,.885,.32,1.275)}
    .modal-wrap.open .modal{transform:translateY(0)}
    .modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
    .modal-title{font-size:1.4rem;font-weight:900}

    /* STATS MODAL */
    .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
    .stat-box{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:18px;padding:14px}
    .stat-k{font-size:.7rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:800}
    .stat-v{font-size:1.2rem;font-weight:900;margin-top:6px}
    .stat-bar{height:6px;border-radius:999px;background:rgba(255,255,255,.1);margin-top:10px;overflow:hidden}
    .stat-bar-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,#4ade80,#10b981);transition:width .6s ease}
    .stats-player-head{display:flex;align-items:center;gap:12px;margin-bottom:16px}
    .stats-ava{font-size:2rem}
    .stats-pname{font-size:1.1rem;font-weight:900}
    .stats-sub{font-size:.8rem;color:var(--muted);margin-top:3px}
    .stats-topline{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:4px}
    .mini-pill{height:26px;padding:0 12px;border-radius:999px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);display:inline-flex;align-items:center;font-size:.73rem;font-weight:800;color:var(--text)}

    /* TOAST */
    .toast{position:fixed;top:20px;left:50%;transform:translate(-50%,-100px);background:linear-gradient(135deg,#4ade80,#10b981);color:#000;padding:13px 26px;border-radius:999px;font-weight:900;font-size:.95rem;transition:.4s cubic-bezier(.175,.885,.32,1.275);z-index:200;opacity:0;box-shadow:0 10px 24px rgba(16,185,129,.38);pointer-events:none}
    .toast.show{transform:translate(-50%,0);opacity:1}

    @media(max-width:560px){
      .score-row{font-size:2.9rem;gap:11px}
      .flag-wrap{font-size:2.7rem}
      .entry{flex-direction:column;align-items:stretch}
      .save{text-align:center;padding:16px}
      .stepper-group{justify-content:space-between;width:100%}
      .stats-grid{grid-template-columns:1fr 1fr}
      .lb-row{grid-template-columns:30px 1fr auto auto;gap:8px}
    }
    @media(min-width:700px){
      .modal-wrap{align-items:center}
      .modal{border-radius:32px}
    }
    @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-in">
      <div class="brand">🏆 Pishbini Pro</div>
      <button class="ghost" id="boardBtn">👑 Leaderboard</button>
    </div>
  </header>

  <div class="wrap">
    <section class="hero">
      <h1>Pishbini<br>Bazi Ha</h1>
      <div class="players" id="playerTabs"></div>
      <div class="filters">
        <button class="filter active" data-view="upcoming">Upcoming 🕒</button>
        <button class="filter" data-view="live">Live 🔴</button>
        <button class="filter" data-view="finished">Finished ✅</button>
        <button class="filter" data-view="all">All 🌍</button>
      </div>
    </section>
    <section class="list" id="matchList"></section>
  </div>

  <div class="lb-section">
    <div class="lb-head">Leaderboard</div>
    <div class="lb-surface" id="lbInline"></div>
  </div>

  <!-- Leaderboard Modal -->
  <div class="modal-wrap" id="boardModal">
    <div class="modal">
      <div class="modal-head">
        <div class="modal-title">👑 Standings</div>
        <button class="ghost" id="closeBoard">Baste</button>
      </div>
      <div id="leaderRows"></div>
    </div>
  </div>

  <!-- Stats Modal -->
  <div class="modal-wrap" id="statsModal">
    <div class="modal">
      <div class="modal-head">
        <div class="modal-title">📊 Amar Bazikon</div>
        <button class="ghost" id="closeStats">Baste</button>
      </div>
      <div id="statsBody"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getDatabase, ref, set, onValue } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js';

const app = initializeApp({
  apiKey:'AIzaSyB3T6VN31aw7bezi7wJh9kBSdTuOdAfHGo',
  authDomain:'pishbini-bazi-ha.firebaseapp.com',
  databaseURL:'https://pishbini-bazi-ha-default-rtdb.firebaseio.com',
  projectId:'pishbini-bazi-ha',
  storageBucket:'pishbini-bazi-ha.firebasestorage.app',
  messagingSenderId:'195538591321',
  appId:'1:195538591321:web:63a099506ee9a1b3a49b48'
});
const db = getDatabase(app);
const $ = id => document.getElementById(id);

const PLAYERS = [
  {id:'HANBA', ava:'🦅'},
  {id:'YASIN BAMBA', ava:'🦁'},
  {id:'AMA BAMBA', ava:'🐺'},
  {id:'KAMBAB', ava:'🦍'}
];

const FLAGS = {
  'Argentina':'🇦🇷','Australia':'🇦🇺','Belgium':'🇧🇪','Bolivia':'🇧🇴',
  'Bosnia and Herzegovina':'🇧🇦','Brazil':'🇧🇷','Canada':'🇨🇦','Cameroon':'🇨🇲',
  'Cape Verde':'🇨🇻','Chile':'🇨🇱','Colombia':'🇨🇴','Costa Rica':'🇨🇷',
  'Croatia':'🇭🇷','Czech Republic':'🇨🇿','Denmark':'🇩🇰','Ecuador':'🇪🇨',
  'Egypt':'🇪🇬','England':'🏴󠁧󠁢󠁥󠁮󠁧󠁿','France':'🇫🇷','Germany':'🇩🇪',
  'Ghana':'🇬🇭','Guatemala':'🇬🇹','Honduras':'🇭🇳','Iceland':'🇮🇸',
  'Iran':'🇮🇷','Jamaica':'🇯🇲','Japan':'🇯🇵','Mali':'🇲🇱',
  'Mexico':'🇲🇽','Morocco':'🇲🇦','Netherlands':'🇳🇱','New Zealand':'🇳🇿',
  'Nigeria':'🇳🇬','Panama':'🇵🇦','Paraguay':'🇵🇾','Peru':'🇵🇪',
  'Poland':'🇵🇱','Portugal':'🇵🇹','Qatar':'🇶🇦','Romania':'🇷🇴',
  'Saudi Arabia':'🇸🇦','Senegal':'🇸🇳','Serbia':'🇷🇸','Slovenia':'🇸🇮',
  'South Korea':'🇰🇷','Spain':'🇪🇸','Sweden':'🇸🇪','Switzerland':'🇨🇭',
  'Tunisia':'🇹🇳','Turkey':'🇹🇷','Ukraine':'🇺🇦','Uruguay':'🇺🇾',
  'USA':'🇺🇸','United States':'🇺🇸','Venezuela':'🇻🇪'
};

const state = {
  player: localStorage.getItem('pb_player') || 'HANBA',
  view: localStorage.getItem('pb_view') || 'upcoming',
  fixtures:{}, results:{}, livescores:{}, predictions:{}
};

window.stepVal = (id, delta) => {
  const el = $(id); if(!el || el.disabled) return;
  let v = parseInt(el.value||0) + delta;
  if(v<0) v=0; if(v>20) v=20;
  el.value = v;
  if(navigator.vibrate) navigator.vibrate(12);
};

function getIranTime(match) {
  if(!match.local_date) return {time:'--:--',date:'--'};
  const d = new Date(match.local_date.replace(' ','T')+'Z');
  const time = new Intl.DateTimeFormat('en-GB',{timeZone:'Asia/Tehran',hour:'2-digit',minute:'2-digit'}).format(d);
  const date = new Intl.DateTimeFormat('en-GB',{timeZone:'Asia/Tehran',month:'short',day:'numeric'}).format(d);
  return {time,date};
}
function startTs(m){ return new Date((m.local_date||'').replace(' ','T')+'Z').getTime(); }
function hasStarted(m){ return Date.now() >= startTs(m); }
function isFinished(m){ return String(m.finished||'').toUpperCase()==='TRUE'; }
function isLive(m){ return !isFinished(m) && !!state.livescores[m.id]; }
function resultDir(a,b){ return a===b?0:a>b?1:-1; }
function getFlag(name){ return FLAGS[name]||'🏳️'; }

function calcPoints(pid){
  let pts=0;
  Object.entries(state.results||{}).forEach(([id,r])=>{
    const p = state.predictions[pid]?.[id];
    if(!p) return;
    if(+p.g1===+r.g1 && +p.g2===+r.g2) pts+=3;
    else if(resultDir(+p.g1,+p.g2)===resultDir(+r.g1,+r.g2)) pts+=1;
  });
  return pts;
}

function getPlayerStats(pid){
  const allPreds = state.predictions[pid]||{};
  const totalPicks = Object.keys(allPreds).length;
  let exactHits=0, correctSide=0, graded=0, bestStreak=0, streak=0;
  const ordered = Object.values(state.fixtures||{}).filter(m=>m&&m.home_name).sort((a,b)=>startTs(a)-startTs(b));
  ordered.forEach(m=>{
    const pr = allPreds[m.id];
    const res = state.results[m.id];
    if(!pr||!res) return;
    graded++;
    if(+pr.g1===+res.g1 && +pr.g2===+res.g2){ exactHits++; streak++; }
    else if(resultDir(+pr.g1,+pr.g2)===resultDir(+res.g1,+res.g2)){ correctSide++; streak++; }
    else{ streak=0; }
    if(streak>bestStreak) bestStreak=streak;
  });
  const accuracy = graded ? Math.round(((exactHits+correctSide)/graded)*100) : 0;
  return {pid, totalPicks, points:calcPoints(pid), exactHits, correctSide, accuracy, bestStreak, graded};
}

function openStats(pid){
  const p = PLAYERS.find(x=>x.id===pid);
  const s = getPlayerStats(pid);
  const acc = s.accuracy;
  $('statsBody').innerHTML = `
    <div class="stats-player-head">
      <div class="stats-ava">${p?.ava||'👤'}</div>
      <div>
        <div class="stats-pname">${s.pid}</div>
        <div class="stats-sub">Az ${s.graded} bazi natije-dar hesab shode</div>
      </div>
    </div>
    <div class="stats-topline">
      <span class="mini-pill">${s.totalPicks} pick</span>
      <span class="mini-pill">${s.points} emtiaz</span>
      <span class="mini-pill">${acc}% dorost</span>
    </div>
    <div class="stats-grid">
      <div class="stat-box"><div class="stat-k">Kol Picka</div><div class="stat-v">${s.totalPicks}</div></div>
      <div class="stat-box"><div class="stat-k">Emtiaz</div><div class="stat-v">${s.points}</div></div>
      <div class="stat-box"><div class="stat-k">Daghigh Zade</div><div class="stat-v">${s.exactHits}</div></div>
      <div class="stat-box"><div class="stat-k">Samte Dorost</div><div class="stat-v">${s.correctSide}</div></div>
      <div class="stat-box">
        <div class="stat-k">Darsad Dorost</div>
        <div class="stat-v">${acc}%</div>
        <div class="stat-bar"><div class="stat-bar-fill" style="width:${acc}%"></div></div>
      </div>
      <div class="stat-box"><div class="stat-k">Rade Dorost</div><div class="stat-v">${s.bestStreak}</div></div>
    </div>`;
  $('statsModal').classList.add('open');
}

function renderLeaderboard(targetId, showStatsBtn){
  const el = $(targetId); if(!el) return;
  const rows = PLAYERS.map(p=>({
    id:p.id, ava:p.ava,
    pts:calcPoints(p.id),
    picks:Object.keys(state.predictions[p.id]||{}).length
  })).sort((a,b)=>b.pts-a.pts||b.picks-a.picks||a.id.localeCompare(b.id));

  if(targetId==='leaderRows'){
    el.innerHTML = rows.map((r,i)=>`
      <div class="lb-row ${i===0?'first':''}">
        <div class="lb-rank">${i===0?'👑':i+1}</div>
        <div>
          <div class="lb-name">${r.ava} ${r.id}</div>
          <div class="lb-picks">${r.picks} picks</div>
        </div>
        <div class="lb-pts">${r.pts}</div>
        <button class="lb-btn" data-statsfor="${r.id}" type="button">Amar</button>
      </div>`).join('') || '<div style="color:var(--muted);padding:10px">No predictions yet.</div>';
  } else {
    el.innerHTML = rows.map((r,i)=>`
      <div class="lb-row ${i===0?'first':''}">
        <div class="lb-rank">${i===0?'👑':i+1}</div>
        <div>
          <div class="lb-name">${r.ava} ${r.id}</div>
          <div class="lb-picks">${r.picks} picks</div>
        </div>
        <div class="lb-pts">${r.pts}</div>
        <button class="lb-btn" data-statsfor="${r.id}" type="button">Amar</button>
      </div>`).join('') || '<div style="color:var(--muted);padding:10px">No predictions yet.</div>';
  }
  el.querySelectorAll('.lb-btn').forEach(btn=>{
    btn.addEventListener('click', e=>{
      e.stopPropagation();
      openStats(btn.dataset.statsfor);
    });
  });
}

function renderAll(){
  // Player tabs
  $('playerTabs').innerHTML = PLAYERS.map(p=>`
    <button class="player ${state.player===p.id?'active':''}" data-player="${p.id}">
      <span class="p-ava">${p.ava}</span>${p.id.split(' ')[0]}
    </button>`).join('');
  document.querySelectorAll('.player').forEach(b=>{
    b.addEventListener('click',()=>{
      state.player=b.dataset.player;
      localStorage.setItem('pb_player', state.player);
      if(navigator.vibrate) navigator.vibrate(18);
      renderAll();
    });
  });

  // Filter tabs
  document.querySelectorAll('.filter').forEach(b=>{
    b.classList.toggle('active', b.dataset.view===state.view);
    b.addEventListener('click',()=>{
      state.view=b.dataset.view;
      localStorage.setItem('pb_view', state.view);
      if(navigator.vibrate) navigator.vibrate(14);
      renderAll();
    });
  });

  // Matches
  const all = Object.values(state.fixtures).filter(m=>m&&m.home_name).sort((a,b)=>startTs(a)-startTs(b));
  let visible = all;
  if(state.view==='upcoming') visible=all.filter(m=>!isFinished(m)&&!hasStarted(m));
  if(state.view==='live') visible=all.filter(m=>isLive(m));
  if(state.view==='finished') visible=all.filter(m=>isFinished(m));

  $('matchList').innerHTML = visible.map(m=>{
    const id=m.id;
    const live=isLive(m), fin=isFinished(m), started=hasStarted(m);
    const ls=state.livescores[id], res=state.results[id], myPred=state.predictions[state.player]?.[id];
    const tz=getIranTime(m);
    let g1='0', g2='0', statusUI='';
    if(fin&&res){ g1=res.g1; g2=res.g2; statusUI=`<div class="time-status finished">FT ✅</div>`; }
    else if(live&&ls){ g1=ls.g1; g2=ls.g2; statusUI=`<div class="time-status">${ls.minute||'LIVE'} 🔴</div>`; }
    else{ statusUI=`<div class="time-status upcoming">${tz.time} (Tehran)</div>`; }

    // All predictions chips
    const preds = PLAYERS.map(p=>{
      const pr = state.predictions[p.id]?.[id]; if(!pr) return '';
      let cls='pred-tag';
      if(fin&&res){
        if(+pr.g1===+res.g1&&+pr.g2===+res.g2) cls+=' exact';
        else if(resultDir(+pr.g1,+pr.g2)===resultDir(+res.g1,+res.g2)) cls+=' good';
        else cls+=' bad';
      }
      if(state.player===p.id) cls+=' mine';
      const icon = cls.includes('exact')?'🔥':(cls.includes('good')?'✓':p.ava);
      return `<div class="${cls}"><span class="ava">${icon}</span>${p.id.split(' ')[0]} ${pr.g1}-${pr.g2}</div>`;
    }).join('');

    // Summary row for finished matches
    let summaryRow = '';
    if(fin&&res){
      const exactNames=PLAYERS.filter(p=>{const pr=state.predictions[p.id]?.[id];return pr&&+pr.g1===+res.g1&&+pr.g2===+res.g2;}).map(p=>p.id.split(' ')[0]);
      const goodNames=PLAYERS.filter(p=>{const pr=state.predictions[p.id]?.[id];return pr&&resultDir(+pr.g1,+pr.g2)===resultDir(+res.g1,+res.g2)&&!(+pr.g1===+res.g1&&+pr.g2===+res.g2);}).map(p=>p.id.split(' ')[0]);
      const pills=[];
      if(exactNames.length) pills.push(`<span class="summ-pill exact">🎯 Daghigh: ${exactNames.join(', ')}</span>`);
      if(goodNames.length) pills.push(`<span class="summ-pill good">✓ Samte dorost: ${goodNames.join(', ')}</span>`);
      if(pills.length) summaryRow=`<div class="summary-row">${pills.join('')}</div>`;
    }

    return `
      <div class="match ${live?'live':''}">
        <div class="meta"><span>GROUP ${m.group||'-'}</span><span>${tz.date} · Iran Time</span></div>
        <div class="score-area">
          <div class="team-col">
            <div class="flag-wrap">${getFlag(m.home_name)}</div>
            <div class="team-name">${m.home_name}</div>
          </div>
          <div class="center-col">
            <div class="score-row"><span>${g1}</span><span class="vs-cup">🏆</span><span>${g2}</span></div>
            ${statusUI}
          </div>
          <div class="team-col">
            <div class="flag-wrap">${getFlag(m.away_name)}</div>
            <div class="team-name">${m.away_name}</div>
          </div>
        </div>
        <div class="predict">
          <div class="entry">
            <div class="stepper-group">
              <button class="step-btn" onclick="window.stepVal('g1-${id}',-1)" ${started?'disabled':''}>−</button>
              <input id="g1-${id}" class="box" type="number" value="${myPred?.g1||'0'}" readonly ${started?'disabled':''}>
              <button class="step-btn" onclick="window.stepVal('g1-${id}',1)" ${started?'disabled':''}>+</button>
            </div>
            <span class="dash">−</span>
            <div class="stepper-group">
              <button class="step-btn" onclick="window.stepVal('g2-${id}',-1)" ${started?'disabled':''}>−</button>
              <input id="g2-${id}" class="box" type="number" value="${myPred?.g2||'0'}" readonly ${started?'disabled':''}>
              <button class="step-btn" onclick="window.stepVal('g2-${id}',1)" ${started?'disabled':''}>+</button>
            </div>
            <button class="save ${started?'locked':''}" data-id="${id}" ${started?'disabled':''}>
              ${started?'🔒 Locked':'Save Pick'}
            </button>
          </div>
          ${preds?`<div class="all-preds">${preds}</div>`:''}
          ${summaryRow}
        </div>
      </div>`;
  }).join('');

  // Save buttons
  document.querySelectorAll('.save:not(:disabled)').forEach(b=>{
    b.addEventListener('click', async()=>{
      const id=b.dataset.id;
      const v1=$(`g1-${id}`).value, v2=$(`g2-${id}`).value;
      if(navigator.vibrate) navigator.vibrate([40,40,40]);
      b.innerHTML='Saving...';
      await set(ref(db,`worldcup/shared/predictions/${state.player}/${id}`),{g1:+v1,g2:+v2,ts:Date.now()});
      b.innerHTML='Saved ✓';
      setTimeout(()=>{b.innerHTML='Save Pick';},2000);
      showToast(`${state.player.split(' ')[0]}: ${v1}−${v2} 🔥`);
    });
  });

  renderLeaderboard('lbInline');
}

function showToast(msg){
  const t=$('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

// Modal bindings
$('boardBtn').addEventListener('click',()=>{ renderLeaderboard('leaderRows'); $('boardModal').classList.add('open'); });
$('closeBoard').addEventListener('click',()=>$('boardModal').classList.remove('open'));
$('boardModal').addEventListener('click',e=>{ if(e.target.id==='boardModal') $('boardModal').classList.remove('open'); });
$('closeStats').addEventListener('click',()=>$('statsModal').classList.remove('open'));
$('statsModal').addEventListener('click',e=>{ if(e.target.id==='statsModal') $('statsModal').classList.remove('open'); });

// Firebase
let booted=false;
onValue(ref(db,'worldcup/shared'), snap=>{
  const d=snap.val()||{};
  state.fixtures=d.fixtures||{}; state.results=d.results||{};
  state.livescores=d.livescores||{}; state.predictions=d.predictions||{};
  renderAll();
});
</script>
</body>
</html>
